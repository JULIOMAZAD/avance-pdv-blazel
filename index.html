<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avance por Punto de Venta – Blazel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}
.screen{display:none}.screen.active{display:block}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:#1a1a2e}
.login-card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:1.5rem}
.brand{font-size:12px;font-weight:700;letter-spacing:4px;color:#999;text-transform:uppercase;margin-bottom:6px}
.login-logo h1{font-size:22px;font-weight:700;color:#cc0000;line-height:1.3}
.login-logo p{font-size:13px;color:#888;margin-top:4px}
.fg{margin-top:1rem}
.fg label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;color:#1a1a2e;background:#fafafa}
.fg select:focus,.fg input:focus{outline:none;border-color:#cc0000;background:#fff}
.btn-login{width:100%;padding:13px;background:#cc0000;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:1.5rem}
.btn-login:hover{background:#aa0000}
.err{color:#cc0000;font-size:12px;margin-top:8px;display:none}
.main-wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top-bar{background:#fff;border-radius:14px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem}
.top-left h2{font-size:19px;font-weight:700;color:#cc0000}
.top-left .pdv{font-size:13px;color:#666;margin-top:2px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-out{padding:8px 16px;background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#444}
.btn-out:hover{border-color:#cc0000;color:#cc0000}
.btn-vend{padding:8px 16px;background:#1a1a2e;border:1.5px solid #1a1a2e;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#fff}
.btn-vend:hover{background:#2d3561}
.mes-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.mes-tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555}
.mes-tab.active{border-color:#cc0000;background:#cc0000;color:#fff}
.mes-tab:hover:not(.active){border-color:#cc0000;color:#cc0000}
.info-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.chip{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:6px 14px;font-size:12px;color:#666}
.chip strong{color:#1a1a2e;font-weight:600}
.table-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:1rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
thead tr{background:#1a1a2e}
thead th{padding:10px 12px;color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:center;white-space:nowrap}
thead th:first-child{text-align:left;padding-left:16px}
.cat-row td{background:#2d3561;color:#fff !important;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:7px 16px}
tbody tr:not(.cat-row){border-bottom:1px solid #f0f0f0}
tbody tr:not(.cat-row):hover{background:#fafafa}
td{padding:9px 12px;text-align:center;color:#333}
td:first-child{text-align:left;padding-left:16px;font-weight:500;color:#1a1a2e}
.total-row td{background:#1a1a2e;color:#fff;font-weight:700}
.total-row td:first-child{padding-left:16px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.t-exc{background:#e6f4ea;color:#1a7a33}
.t-reg{background:#fff8e1;color:#b07000}
.t-pun{background:#fdecea;color:#cc0000}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dg{background:#22c55e}.dy{background:#f59e0b}.dr{background:#ef4444}
.falta-r{color:#cc0000;font-weight:600}.falta-g{color:#22a843;font-weight:600}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #eee;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-err{background:#fff5f5;border:1px solid #fcc;border-radius:10px;padding:1rem;color:#cc0000;font-size:13px;margin-bottom:1rem}
/* ===== Gerencia: selector de tiendas ===== */
.ger-pick{background:#fff;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.ger-pick h3{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px}
.ger-chips{display:flex;gap:8px;flex-wrap:wrap}
.tchip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fafafa;color:#555;user-select:none}
.tchip.on{border-color:#cc0000;background:#cc0000;color:#fff}
.tchip.all{border-color:#1a1a2e;color:#1a1a2e}
.tchip.all.on{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1rem}
.kpi{background:#fff;border-radius:14px;padding:1rem 1.25rem;border-left:4px solid #cc0000}
.kpi .lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
.kpi .val{font-size:24px;font-weight:800;color:#1a1a2e;margin-top:4px}
.kpi .sub{font-size:12px;color:#666;margin-top:2px}
.kpi.green{border-left-color:#22a843}.kpi.amber{border-left-color:#e0a82e}.kpi.red{border-left-color:#cc0000}
@media(max-width:600px){.main-wrap{padding:1rem .5rem}td,th{padding:7px 8px;font-size:12px}.kpi .val{font-size:20px}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand">Blazel</div>
        <h1>Avance por Punto de Venta</h1>
        <p>Ingresa con las credenciales de tu tienda</p>
      </div>
      <div class="fg">
        <label>Punto de Venta</label>
        <select id="tiendaSel">
          <option value="">-- Seleccionar tienda --</option>
          <option value="Tienda - Mall Bellavista">Tienda - Mall Bellavista</option>
          <option value="Tienda - Mall del Sur 1">Tienda - Mall del Sur 1</option>
          <option value="Tienda - Mall del Sur 2">Tienda - Mall del Sur 2</option>
          <option value="Tienda - Mega Plaza">Tienda - Mega Plaza</option>
          <option value="Tienda - Plaza Norte">Tienda - Plaza Norte</option>
          <option value="Tienda - Primavera">Tienda - Primavera</option>
          <option value="Tienda - Rambla Brasil">Tienda - Rambla Brasil</option>
          <option value="Tienda - Santa Anita">Tienda - Santa Anita</option>
          <option value="Tienda - Santa Anita 2">Tienda - Santa Anita 2</option>
          <option value="Call Center">Call Center</option>
          <option value="GERENCIA">🔑 Gerencia — Todas las tiendas</option>
        </select>
      </div>
      <div class="fg">
        <label>Contraseña</label>
        <input type="password" id="passIn" placeholder="Ingresa la contraseña"/>
      </div>
      <div id="loginErr" class="err">Tienda o contraseña incorrecta.</div>
      <button class="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
  </div>
</div>

<!-- ============ TIENDA (vista por punto de venta) ============ -->
<div id="mainScreen" class="screen">
  <div class="main-wrap">
    <div class="top-bar">
      <div class="top-left">
        <h2>Avance por Punto de Venta</h2>
        <div class="pdv" id="dispTienda"></div>
      </div>
      <div class="top-actions">
        <button class="btn-out" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </div>
    <div class="mes-tabs" id="mesTabs"></div>
    <div id="infoRow" class="info-row"></div>
    <div id="loadMsg"></div>
    <div id="tableSection"></div>
  </div>
</div>

<!-- ============ GERENCIA (consolidado de tiendas) ============ -->
<div id="gerScreen" class="screen">
  <div class="main-wrap">
    <div class="top-bar">
      <div class="top-left">
        <h2>Gerencia — Consolidado de Tiendas</h2>
        <div class="pdv">Toca una tienda para verla sola, o "Todas — Cuota Global" para el consolidado</div>
      </div>
      <div class="top-actions">
        <button class="btn-vend" onclick="abrirVendedor()">📊 Ver por vendedor</button>
        <button class="btn-out" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </div>
    <div class="mes-tabs" id="gerMesTabs"></div>
    <div class="ger-pick">
      <h3>Tiendas</h3>
      <div class="ger-chips" id="gerChips"></div>
    </div>
    <div id="gerInfoRow" class="info-row"></div>
    <div id="gerKpis" class="kpis"></div>
    <div id="gerLoadMsg"></div>
    <div id="gerTableSection"></div>
  </div>
</div>

<!-- ============ VENDEDOR (iframe al dashboard por vendedor) ============ -->
<div id="vendedorScreen" class="screen">
  <div style="background:#1a1a2e;padding:10px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10">
    <button class="btn-out" id="vBackBtn" onclick="salirVendedor()">🏬 Tiendas</button>
    <span style="color:#fff;font-weight:600;font-size:14px">Avance por Vendedor</span>
  </div>
  <iframe id="vFrame" style="width:100%;height:calc(100vh - 53px);border:none;display:block;background:#0a0b0d"></iframe>
</div>

<script>
/* ====================== CONFIG ====================== */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlm0VRD8L88rtmDJStmEM1JkcOvO3DbZIQAM8VcVBbRF5nwbS_HpH35QsvNPK-RK9H/exec";

const PWD={
  "Tienda - Mall Bellavista":"Bella9995",
  "Tienda - Mall del Sur 1":"Sur1-7998",
  "Tienda - Mall del Sur 2":"Sur2-7999",
  "Tienda - Mega Plaza":"Mega7998",
  "Tienda - Plaza Norte":"Norte9995",
  "Tienda - Primavera":"Primav7998",
  "Tienda - Rambla Brasil":"Brasil7998",
  "Tienda - Santa Anita":"SAnita9995",
  "Tienda - Santa Anita 2":"SAnita2-7999",
  "Call Center":"Callcen-2026",
  "GERENCIA":"Gerencia-2026"
};

// Nombre de hoja por tienda (debe coincidir EXACTO con la pestaña del Google Sheet)
const SHEET_NAME={
  "Tienda - Mall Bellavista":"mall bellavista",
  "Tienda - Mall del Sur 1":"mall del sur 1",
  "Tienda - Mall del Sur 2":"MALL DEL SU 2",
  "Tienda - Mega Plaza":"mega plaza",
  "Tienda - Plaza Norte":"plaza norte",
  "Tienda - Primavera":"primavera",
  "Tienda - Rambla Brasil":"rambla",
  "Tienda - Santa Anita":"santa anita",
  "Tienda - Santa Anita 2":"santa anita2",
  "Call Center":"call center"
};
// Etiqueta corta para los chips de Gerencia
const TIENDA_LABEL={
  "Tienda - Mall Bellavista":"Bellavista",
  "Tienda - Mall del Sur 1":"Sur 1",
  "Tienda - Mall del Sur 2":"Sur 2",
  "Tienda - Mega Plaza":"Mega Plaza",
  "Tienda - Plaza Norte":"Plaza Norte",
  "Tienda - Primavera":"Primavera",
  "Tienda - Rambla Brasil":"Rambla",
  "Tienda - Santa Anita":"Santa Anita",
  "Tienda - Santa Anita 2":"Santa Anita 2",
  "Call Center":"Call Center"
};
const GER_ALL=Object.keys(SHEET_NAME); // 10 tiendas (para ver una por una)
// Cuota global oficial = 9 tiendas (Santa Anita 2 NO suma: repite a Santa Anita)
const GER_GLOBAL=[
  "Tienda - Mall Bellavista","Tienda - Mall del Sur 1","Tienda - Mall del Sur 2",
  "Tienda - Mega Plaza","Tienda - Plaza Norte","Tienda - Primavera",
  "Tienda - Rambla Brasil","Tienda - Santa Anita","Call Center"
];

const MESES=[
  {label:"Mayo 2026", key:"mayo"},
  {label:"Junio 2026", key:"junio"}
];

let curTienda="", curMes="junio", cache={};
let gerenteMode=false, gerMes="junio", gerActive="__ALL__"; // pestaña activa: __ALL__ o una tienda

/* ====================== LOGIN ====================== */
function doLogin(){
  const t=document.getElementById("tiendaSel").value;
  const p=document.getElementById("passIn").value;
  const e=document.getElementById("loginErr");
  if(!t||PWD[t]!==p){e.style.display="block";return;}
  e.style.display="none";

  if(t==="GERENCIA"){
    gerenteMode=true;
    showScreen("gerScreen");
    renderGerMesTabs();
    renderGerChips();
    loadGerencia();
    return;
  }
  gerenteMode=false;
  curTienda=t;
  document.getElementById("dispTienda").textContent=t;
  showScreen("mainScreen");
  renderTabs();
  loadData(curMes);
}

function doLogout(){
  curTienda="";gerenteMode=false;
  document.getElementById("passIn").value="";
  document.getElementById("tiendaSel").value="";
  showScreen("loginScreen");
  document.getElementById("tableSection").innerHTML="";
  document.getElementById("infoRow").innerHTML="";
  document.getElementById("gerTableSection").innerHTML="";
  document.getElementById("gerKpis").innerHTML="";
}

function showScreen(id){
  ["loginScreen","mainScreen","gerScreen","vendedorScreen"].forEach(s=>{
    document.getElementById(s).classList.toggle("active", s===id);
  });
}

/* ====================== VENDEDOR (iframe) ====================== */
function abrirVendedor(){
  var f=document.getElementById('vFrame');
  if(!f.getAttribute('src')) f.setAttribute('src','vendedor.html');
  showScreen("vendedorScreen");
}
function salirVendedor(){
  showScreen(gerenteMode ? "gerScreen" : "mainScreen");
}

document.getElementById("passIn").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

/* ====================== TIENDA (una sola) ====================== */
function renderTabs(){
  document.getElementById("mesTabs").innerHTML=MESES.map(m=>
    `<button class="mes-tab${m.key===curMes?" active":""}" onclick="selectMes('${m.key}')">${m.label}</button>`
  ).join("");
}
function selectMes(mes){curMes=mes;renderTabs();loadData(mes);}

async function loadData(mes){
  const cacheKey=curTienda+"_"+mes;
  if(cache[cacheKey]){showTable(cache[cacheKey]);return;}
  document.getElementById("loadMsg").innerHTML='<div class="loading"><div class="spinner"></div><br>Cargando datos...</div>';
  document.getElementById("tableSection").innerHTML="";
  document.getElementById("infoRow").innerHTML="";
  try{
    const data=await fetchTienda(SHEET_NAME[curTienda]||"", mes);
    cache[cacheKey]=data;
    showTable(data);
  }catch(ex){
    document.getElementById("loadMsg").innerHTML=`<div class="load-err">${ex.message||"No se pudo cargar los datos. Intenta de nuevo."}</div>`;
  }
}

/* ====================== FETCH + PARSE (compartido) ====================== */
async function fetchTienda(sheet, mes){
  const cacheKey="raw_"+sheet+"_"+mes;
  if(cache[cacheKey]) return parseRows(cache[cacheKey]);
  const url=`${SCRIPT_URL}?tienda=${encodeURIComponent(sheet)}&mes=${mes}`;
  const res=await fetch(url);
  const json=await res.json();
  if(json.error) throw new Error("Error: "+json.error);
  cache[cacheKey]=json.data;
  return parseRows(json.data);
}

function parseRows(rows){
  let avance="", mes="", dias="", pdvLabel="";
  for(let i=0;i<3;i++){
    const r=rows[i]||[];
    for(let j=0;j<r.length;j++){
      const v=String(r[j]||"").trim().toUpperCase();
      if(v==="AVANCE"&&rows[i+1]) avance=String(rows[i+1][j]||"").trim();
      if(v==="MES"&&rows[i+1]) mes=String(rows[i+1][j]||"").trim();
      if(v==="DIAS"&&rows[i+1]) dias=String(rows[i+1][j]||"").trim();
    }
  }
  for(let i=2;i<6;i++){
    const r=rows[i]||[];
    for(let j=0;j<r.length;j++){
      if(String(r[j]||"").toLowerCase().includes("punto de venta")){
        for(let k=j+1;k<r.length;k++){
          const v=String(r[k]||"").trim();
          if(v&&!v.toLowerCase().includes("asesor")){pdvLabel=v;break;}
        }
      }
    }
  }
  const CATS=["prepago","postpago","residencial","otros"];
  const struct={prepago:[],postpago:[],residencial:[],otros:[]};
  let curCat="prepago", totalRow=null;
  let nameCol=2, metaCol=3, avCol=4, pctCol=5, faltaCol=6, vdCol=7, pfCol=8, estadoCol=9;
  for(let i=5;i<15;i++){
    const r=rows[i]||[];
    for(let j=0;j<r.length;j++){
      const v=String(r[j]||"").trim().toLowerCase();
      if(v==="meta"){metaCol=j;nameCol=j-1;avCol=j+1;pctCol=j+2;faltaCol=j+3;vdCol=j+4;pfCol=j+5;estadoCol=j+6;break;}
    }
    if(metaCol!==3) break;
  }
  for(let i=10;i<rows.length;i++){
    const r=rows[i]||[];
    const name=String(r[nameCol]||"").trim();
    if(!name) continue;
    const nl=name.toLowerCase().trim();
    if(CATS.includes(nl)||nl.startsWith("residencial")){curCat=nl.startsWith("residencial")?"residencial":nl;continue;}
    if(nl.startsWith("total")){
      totalRow={meta:r[metaCol],av:r[avCol],pct:r[pctCol],falta:r[faltaCol],vd:r[vdCol],pf:r[pfCol],estado:String(r[estadoCol]||"")};
      continue;
    }
    if(nl.includes("coordinador")||nl.includes("jefe")||nl.includes("gerente")) continue;
    if(typeof r[metaCol]!=="number"&&typeof r[avCol]!=="number") continue;
    struct[curCat].push({name,meta:r[metaCol],av:r[avCol],pct:r[pctCol],falta:r[faltaCol],vd:r[vdCol],pf:r[pfCol],estado:String(r[estadoCol]||"")});
  }
  return{struct,avance,mes,dias,pdvLabel,totalRow};
}

/* ====================== FORMATO + TAGS ====================== */
function fmtPct(v){
  if(v===""||v===undefined||v===null||v===" ") return "-";
  const n=parseFloat(String(v));
  if(isNaN(n)) return "-";
  return (n*100).toFixed(1)+"%";
}
function fmt(v){
  if(v===""||v===undefined||v===null||v===" ") return "-";
  const n=parseFloat(String(v));
  if(isNaN(n)) return String(v);
  return n%1===0?n.toLocaleString("es-PE"):n.toLocaleString("es-PE",{maximumFractionDigits:2});
}
function getTag(estado){
  const e=String(estado||"").toLowerCase();
  if(e.includes("excelente")) return{cls:"t-exc",dot:"dg",lbl:"Excelente ✅"};
  if(e.includes("regular")) return{cls:"t-reg",dot:"dy",lbl:"Vamos regular 🟡"};
  return{cls:"t-pun",dot:"dr",lbl:"Ponle punche 🔴"};
}
function estadoFromPct(pct){
  if(pct>=1) return "Excelente";
  if(pct>=0.8) return "Vamos regular";
  return "Ponle punche";
}

/* ====================== TABLA (una tienda) ====================== */
function showTable(data){
  document.getElementById("loadMsg").innerHTML="";
  document.getElementById("infoRow").innerHTML=
    `<div class="chip">Avance día: <strong>${data.avance||"-"}</strong></div>
     <div class="chip">Mes: <strong>${data.mes||"-"}</strong></div>
     <div class="chip">Días del mes: <strong>${data.dias||"-"}</strong></div>
     <div class="chip">PDV: <strong>${data.pdvLabel||curTienda}</strong></div>`;
  document.getElementById("tableSection").innerHTML=buildTableHtml(data.struct,data.totalRow,false);
}

/* ====================== GERENCIA (consolidado) ====================== */
function renderGerMesTabs(){
  document.getElementById("gerMesTabs").innerHTML=MESES.map(m=>
    `<button class="mes-tab${m.key===gerMes?" active":""}" onclick="selectGerMes('${m.key}')">${m.label}</button>`
  ).join("");
}
function selectGerMes(mes){gerMes=mes;renderGerMesTabs();loadGerencia();}

function renderGerChips(){
  const isAll = gerActive==="__ALL__";
  let html=`<div class="tchip all${isAll?" on":""}" onclick="pickAll()">${isAll?"✓ ":""}Todas — Cuota Global</div>`;
  html+=GER_ALL.map(t=>{
    const on=gerActive===t;
    return `<div class="tchip${on?" on":""}" onclick="pickTienda('${t.replace(/'/g,"\\'")}')">${on?"✓ ":""}${TIENDA_LABEL[t]}</div>`;
  }).join("");
  document.getElementById("gerChips").innerHTML=html;
}
function pickAll(){ gerActive="__ALL__"; renderGerChips(); loadGerencia(); }
function pickTienda(t){ gerActive=t; renderGerChips(); loadGerencia(); }

async function fetchInBatches(items, size, fn){
  const out=[];
  for(let i=0;i<items.length;i+=size){
    const batch=items.slice(i,i+size);
    const r=await Promise.all(batch.map(fn));
    out.push(...r);
    const done=Math.min(i+size,items.length);
    if(done<items.length){
      document.getElementById("gerLoadMsg").innerHTML='<div class="loading"><div class="spinner"></div><br>Sumando '+done+' de '+items.length+' tiendas...</div>';
    }
  }
  return out;
}

async function loadGerencia(){
  const sel = gerActive==="__ALL__" ? GER_GLOBAL.slice() : [gerActive];
  const km=document.getElementById("gerKpis");
  const ts=document.getElementById("gerTableSection");
  const info=document.getElementById("gerInfoRow");
  if(!sel.length){
    document.getElementById("gerLoadMsg").innerHTML="";
    info.innerHTML=""; km.innerHTML="";
    ts.innerHTML=`<div class="load-err">Marca al menos una tienda para ver el consolidado.</div>`;
    return;
  }
  info.innerHTML=""; km.innerHTML=""; ts.innerHTML="";
  document.getElementById("gerLoadMsg").innerHTML='<div class="loading"><div class="spinner"></div><br>Sumando '+sel.length+' tienda(s)...</div>';
  try{
    // Pedir en tandas pequeñas: el Apps Script falla si se le piden todas a la vez
    const results=await fetchInBatches(sel, 3, t=>fetchTienda(SHEET_NAME[t]||"", gerMes)
      .then(d=>({t,d})).catch(e=>({t,d:null,err:(e&&e.message)||"error"})));
    let ok=results.filter(r=>r.d);
    let failed=results.filter(r=>!r.d);
    // Reintento de las que fallaron, una por una (más confiable)
    if(failed.length){
      document.getElementById("gerLoadMsg").innerHTML='<div class="loading"><div class="spinner"></div><br>Reintentando '+failed.length+' tienda(s)...</div>';
      const retry=await fetchInBatches(failed.map(r=>r.t), 1, t=>fetchTienda(SHEET_NAME[t]||"", gerMes)
        .then(d=>({t,d})).catch(e=>({t,d:null,err:(e&&e.message)||"error"})));
      ok=ok.concat(retry.filter(r=>r.d));
      failed=retry.filter(r=>!r.d);
    }
    if(!ok.length) throw new Error("No se pudo cargar ninguna de las tiendas seleccionadas. Reintenta en unos segundos.");

    // día de avance / días del mes (se toman de la primera tienda con datos)
    let avDia=0, diasMes=0, mesLabel="";
    for(const r of ok){
      const a=parseInt(r.d.avance), dm=parseInt(r.d.dias);
      if(!isNaN(a)&&a>0){avDia=a; mesLabel=r.d.mes||mesLabel;}
      if(!isNaN(dm)&&dm>0) diasMes=dm;
      if(avDia&&diasMes) break;
    }

    // === sumar meta + avance por (categoría + producto) ===
    const acc={prepago:{}, postpago:{}, residencial:{}, otros:{}};
    const order={prepago:[], postpago:[], residencial:[], otros:[]};
    for(const r of ok){
      for(const cat of ["prepago","postpago","residencial","otros"]){
        for(const p of (r.d.struct[cat]||[])){
          const key=p.name.toLowerCase().trim();
          if(!acc[cat][key]){acc[cat][key]={name:p.name,meta:0,av:0};order[cat].push(key);}
          const m=parseFloat(p.meta), a=parseFloat(p.av);
          if(!isNaN(m)) acc[cat][key].meta+=m;
          if(!isNaN(a)) acc[cat][key].av+=a;
        }
      }
    }

    // === recalcular proyección / falta / venta diaria / estado ===
    const factor = (avDia>0) ? (diasMes/avDia) : 0;          // (avance ÷ día actual) × días del mes
    const diasRest = (diasMes>avDia) ? (diasMes-avDia) : 0;
    const struct={prepago:[], postpago:[], residencial:[], otros:[]};
    for(const cat of ["prepago","postpago","residencial","otros"]){
      for(const key of order[cat]){
        const it=acc[cat][key];
        const meta=it.meta, av=it.av;
        const proy = factor>0 ? av*factor : av;             // unidades proyectadas a fin de mes
        const pct  = meta>0 ? proy/meta : 0;                // proyección %
        const falta= meta-av;
        const vd   = (falta>0 && diasRest>0) ? falta/diasRest : 0;
        struct[cat].push({name:it.name, meta, av, pct, falta, vd, pf:proy, estado:estadoFromPct(pct)});
      }
    }
    // TOTAL global = suma de la fila TOTAL real de cada tienda (cargo fijo en soles)
    let totMeta=0, totAv=0;
    for(const r of ok){
      const m=parseFloat(r.d.totalRow&&r.d.totalRow.meta), a=parseFloat(r.d.totalRow&&r.d.totalRow.av);
      if(!isNaN(m)) totMeta+=m;
      if(!isNaN(a)) totAv+=a;
    }
    const totProy = factor>0 ? totAv*factor : totAv;
    const totPct  = totMeta>0 ? totProy/totMeta : 0;
    const totFalta= totMeta-totAv;
    const totVd   = (totFalta>0 && diasRest>0) ? totFalta/diasRest : 0;
    const totalRow={meta:totMeta, av:totAv, pct:totPct, falta:totFalta, vd:totVd, pf:totProy, estado:estadoFromPct(totPct)};

    // === pintar ===
    const avancePct = totMeta>0 ? totAv/totMeta : 0;
    info.innerHTML=
      `<div class="chip">Tiendas: <strong>${ok.length}${results.length>ok.length?(" de "+results.length):""}</strong></div>
       <div class="chip">Avance día: <strong>${avDia||"-"}</strong></div>
       <div class="chip">Mes: <strong>${mesLabel||gerMes}</strong></div>
       <div class="chip">Días del mes: <strong>${diasMes||"-"}</strong></div>`;
    document.getElementById("gerKpis").innerHTML=
      kpiCard("Cuota total (S/)", fmt(totMeta), "Suma del TOTAL de cada tienda") +
      kpiCard("Avance total (S/)", fmt(totAv), fmtPct(avancePct)+" de la cuota") +
      kpiCard("Proyección", fmtPct(totPct), "a cierre de mes", clsByPct(totPct)) +
      kpiCard("Falta (S/)", fmt(totFalta>0?totFalta:0), totFalta>0?("≈ "+fmt(totVd)+" / día"):"Cuota cubierta ✅", totFalta>0?"red":"green") +
      kpiCard("Estado", "", estadoFromPct(totPct), clsByPct(totPct), getTag(estadoFromPct(totPct)));

    document.getElementById("gerLoadMsg").innerHTML = failed.length
      ? `<div class="load-err">⚠️ No cargaron ${failed.length} tienda(s): <strong>${failed.map(r=>TIENDA_LABEL[r.t]).join(", ")}</strong>. El total de abajo NO las incluye. <button class="btn-out" style="margin-left:8px" onclick="loadGerencia()">Reintentar</button></div>`
      : "";
    document.getElementById("gerTableSection").innerHTML=buildTableHtml(struct,totalRow,true);
  }catch(ex){
    document.getElementById("gerLoadMsg").innerHTML="";
    document.getElementById("gerTableSection").innerHTML=`<div class="load-err">${ex.message||"Error al consolidar."}</div>`;
  }
}

function clsByPct(p){return p>=1?"green":(p>=0.8?"amber":"red");}
function kpiCard(lbl,val,sub,cls,tag){
  const tagHtml = tag ? `<span class="tag ${tag.cls}" style="margin-top:6px"><span class="dot ${tag.dot}"></span>${tag.lbl}</span>` : "";
  return `<div class="kpi ${cls||""}">
    <div class="lbl">${lbl}</div>
    ${val!==""?`<div class="val">${val}</div>`:""}
    ${tag?tagHtml:`<div class="sub">${sub}</div>`}
  </div>`;
}

/* ====================== TABLA (compartida: tienda y gerencia) ====================== */
function buildTableHtml(struct,totalRow,recalc){
  const CATNAMES={prepago:"Prepago",postpago:"Postpago",residencial:"Residencial",otros:"Otros"};
  let html=`<div class="table-card"><div class="table-wrap"><table>
    <thead><tr>
      <th style="text-align:left;min-width:200px">Producto</th>
      <th>Meta</th><th>Avance</th><th>Proyección</th>
      <th>Falta</th><th>Venta Diaria<br>Para Llegar</th>
      <th>Proyección Final</th><th>Estado</th>
    </tr></thead><tbody>`;
  for(const cat of ["prepago","postpago","residencial","otros"]){
    const prods=struct[cat];
    if(!prods||!prods.length) continue;
    html+=`<tr class="cat-row"><td colspan="8">${CATNAMES[cat]}</td></tr>`;
    for(const p of prods){
      const t=getTag(p.estado);
      const fv=parseFloat(p.falta);
      const fc=(!isNaN(fv)&&fv<=0)?"falta-g":"falta-r";
      html+=`<tr>
        <td>${p.name}</td>
        <td>${fmt(p.meta)}</td><td>${fmt(p.av)}</td>
        <td><span style="display:inline-flex;align-items:center;gap:4px"><span class="dot ${t.dot}"></span>${fmtPct(p.pct)}</span></td>
        <td class="${fc}">${fmt(p.falta)}</td>
        <td>${fmt(p.vd)}</td><td>${fmt(p.pf)}</td>
        <td><span class="tag ${t.cls}">${t.lbl}</span></td>
      </tr>`;
    }
  }
  if(totalRow){
    const t=getTag(totalRow.estado);
    html+=`<tr class="total-row">
      <td>TOTAL</td>
      <td>${fmt(totalRow.meta)}</td><td>${fmt(totalRow.av)}</td>
      <td>${fmtPct(totalRow.pct)}</td>
      <td>${fmt(totalRow.falta)}</td><td>${fmt(totalRow.vd)}</td>
      <td>${fmt(totalRow.pf)}</td>
      <td><span class="tag ${t.cls}">${t.lbl}</span></td>
    </tr>`;
  }
  html+=`</tbody></table></div></div>`;
  return html;
}
</script>
