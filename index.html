<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avance por Punto de Venta – Blazel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}
.screen{display:none}.screen.active{display:block}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:#1a1a2e}
.login-card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:1.5rem}
.brand{font-size:12px;font-weight:700;letter-spacing:4px;color:#999;text-transform:uppercase;margin-bottom:6px}
.login-logo h1{font-size:22px;font-weight:700;color:#cc0000;line-height:1.3}
.login-logo p{font-size:13px;color:#888;margin-top:4px}
.fg{margin-top:1rem}
.fg label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;color:#1a1a2e;background:#fafafa}
.fg select:focus,.fg input:focus{outline:none;border-color:#cc0000;background:#fff}
.btn-login{width:100%;padding:13px;background:#cc0000;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:1.5rem}
.btn-login:hover{background:#aa0000}
.err{color:#cc0000;font-size:12px;margin-top:8px;display:none}
.main-wrap{max-width:980px;margin:0 auto;padding:1.5rem 1rem}
.top-bar{background:#fff;border-radius:14px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem}
.top-left h2{font-size:19px;font-weight:700;color:#cc0000}
.top-left .pdv{font-size:13px;color:#666;margin-top:2px}
.btn-out{padding:8px 16px;background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#444}
.btn-out:hover{border-color:#cc0000;color:#cc0000}
.mes-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.mes-tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555}
.mes-tab.active{border-color:#cc0000;background:#cc0000;color:#fff}
.mes-tab:hover:not(.active){border-color:#cc0000;color:#cc0000}
.info-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.chip{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:6px 14px;font-size:12px;color:#666}
.chip strong{color:#1a1a2e;font-weight:600}
.table-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:1rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
thead tr{background:#1a1a2e}
thead th{padding:10px 12px;color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:center;white-space:nowrap}
thead th:first-child{text-align:left;padding-left:16px}
.cat-row td{background:#2d3561;color:#fff !important;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:7px 16px}
tbody tr:not(.cat-row){border-bottom:1px solid #f0f0f0}
tbody tr:not(.cat-row):hover{background:#fafafa}
td{padding:9px 12px;text-align:center;color:#333}
td:first-child{text-align:left;padding-left:16px;font-weight:500;color:#1a1a2e}
.total-row td{background:#1a1a2e;color:#fff;font-weight:700}
.total-row td:first-child{padding-left:16px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.t-exc{background:#e6f4ea;color:#1a7a33}
.t-reg{background:#fff8e1;color:#b07000}
.t-pun{background:#fdecea;color:#cc0000}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dg{background:#22c55e}.dy{background:#f59e0b}.dr{background:#ef4444}
.falta-r{color:#cc0000;font-weight:600}.falta-g{color:#22a843;font-weight:600}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #eee;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-card{background:#fff;border-radius:14px;padding:2rem;margin-bottom:1rem}
.upload-card h3{font-size:15px;font-weight:600;color:#333;margin-bottom:1rem}
.drop-zone{border:2px dashed #ddd;border-radius:12px;padding:2.5rem;text-align:center;cursor:pointer;color:#aaa;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:#cc0000;color:#cc0000}
@media(max-width:600px){.main-wrap{padding:1rem .5rem}td,th{padding:7px 8px;font-size:12px}}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand">Blazel</div>
        <h1>Avance por Punto de Venta</h1>
        <p>Ingresa con las credenciales de tu tienda</p>
      </div>
      <div class="fg">
        <label>Punto de Venta</label>
        <select id="tiendaSel">
          <option value="">-- Seleccionar tienda --</option>
          <option value="Tienda - Mall Bellavista">Tienda - Mall Bellavista</option>
          <option value="Tienda - Mall del Sur 1">Tienda - Mall del Sur 1</option>
          <option value="Tienda - Mall del Sur 2">Tienda - Mall del Sur 2</option>
          <option value="Tienda - Mega Plaza">Tienda - Mega Plaza</option>
          <option value="Tienda - Plaza Norte">Tienda - Plaza Norte</option>
          <option value="Tienda - Primavera">Tienda - Primavera</option>
          <option value="Tienda - Rambla Brasil">Tienda - Rambla Brasil</option>
          <option value="Tienda - Santa Anita">Tienda - Santa Anita</option>
          <option value="Tienda - Santa Anita 2">Tienda - Santa Anita 2</option>
        </select>
      </div>
      <div class="fg">
        <label>Contraseña</label>
        <input type="password" id="passIn" placeholder="Ingresa la contraseña"/>
      </div>
      <div id="loginErr" class="err">Tienda o contraseña incorrecta.</div>
      <button class="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
  </div>
</div>

<div id="mainScreen" class="screen">
  <div class="main-wrap">
    <div class="top-bar">
      <div class="top-left">
        <h2>Avance por Punto de Venta</h2>
        <div class="pdv" id="dispTienda"></div>
      </div>
      <button class="btn-out" onclick="doLogout()">Cerrar sesión</button>
    </div>
    <div class="mes-tabs" id="mesTabs"></div>
    <div id="uploadSection" class="upload-card">
      <h3>Cargar Excel del mes</h3>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 10px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p style="font-size:14px;font-weight:500">Haz clic o arrastra tu Excel aquí</p>
        <span style="font-size:12px;opacity:.7;display:block;margin-top:4px">El archivo no se sube a ningún servidor — se lee directo en tu navegador</span>
      </div>
      <input type="file" id="fileIn" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])"/>
      <div id="uploadErr" style="color:#cc0000;font-size:13px;margin-top:10px;padding:8px 12px;background:#fff5f5;border-radius:8px;display:none"></div>
    </div>
    <div id="infoRow" class="info-row"></div>
    <div id="loadMsg"></div>
    <div id="tableSection"></div>
  </div>
</div>

<script>
const PWD={
  "Tienda - Mall Bellavista":"Bella9995",
  "Tienda - Mall del Sur 1":"Sur1-7998",
  "Tienda - Mall del Sur 2":"Sur2-7999",
  "Tienda - Mega Plaza":"Mega7998",
  "Tienda - Plaza Norte":"Norte9995",
  "Tienda - Primavera":"Primav7998",
  "Tienda - Rambla Brasil":"Brasil7998",
  "Tienda - Santa Anita":"SAnita9995",
  "Tienda - Santa Anita 2":"SAnita2-7999"
};

// Sheet name mapping per tienda
const SHEETS={
  "Tienda - Mall Bellavista":["mall bellavista","bellavista"],
  "Tienda - Mall del Sur 1":["mall del sur 1","mall del sur1","sur 1","sur1"],
  "Tienda - Mall del Sur 2":["mall del su 2","mall del sur 2","mall del sur2","mall del su2","sur 2","sur2"],
  "Tienda - Mega Plaza":["mega plaza","mega"],
  "Tienda - Plaza Norte":["plaza norte","norte"],
  "Tienda - Primavera":["primavera"],
  "Tienda - Rambla Brasil":["rambla","rambla brasil"],
  "Tienda - Santa Anita":["santa anita"],
  "Tienda - Santa Anita 2":["santa anita2","santa anita 2","anita2"]
};

let curTienda="", cache={}, curMesKey=null;

function doLogin(){
  const t=document.getElementById("tiendaSel").value;
  const p=document.getElementById("passIn").value;
  const e=document.getElementById("loginErr");
  if(!t||PWD[t]!==p){e.style.display="block";return;}
  e.style.display="none";
  curTienda=t;
  document.getElementById("dispTienda").textContent=t;
  document.getElementById("loginScreen").classList.remove("active");
  document.getElementById("mainScreen").classList.add("active");
  refreshTabs();
}

function doLogout(){
  curTienda="";
  document.getElementById("passIn").value="";
  document.getElementById("tiendaSel").value="";
  document.getElementById("mainScreen").classList.remove("active");
  document.getElementById("loginScreen").classList.add("active");
  clearTable();
}

document.getElementById("passIn").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

const dz=document.getElementById("dropZone");
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");handleFile(e.dataTransfer.files[0]);});

function handleFile(file){
  if(!file) return;
  const errEl=document.getElementById("uploadErr");
  errEl.style.display="none";
  document.getElementById("loadMsg").innerHTML='<div class="loading"><div class="spinner"></div><br>Leyendo archivo...</div>';
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      // Find sheet for current tienda
      const possible=SHEETS[curTienda]||[];
      let sheetName=null;
      for(const p of possible){
        const found=wb.SheetNames.find(s=>s.toLowerCase().trim()===p);
        if(found){sheetName=found;break;}
      }
      if(!sheetName){
        // fallback: find sheet whose PDV matches
        for(const sn of wb.SheetNames){
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:""});
          if(rows[3]&&String(rows[3][3]||"").includes(curTienda.replace("Tienda - ",""))){
            sheetName=sn; break;
          }
        }
      }
      if(!sheetName){
        document.getElementById("loadMsg").innerHTML="";
        errEl.textContent="No se encontró la hoja para '"+curTienda+"'. Verifica que el Excel tenga una pestaña con ese PDV.";
        errEl.style.display="block";
        return;
      }
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:""});
      const data=parseRows(rows);
      const mesKey=data.mes+"_dia"+data.avance;
      if(!cache[curTienda]) cache[curTienda]={};
      cache[curTienda][mesKey]=data;
      curMesKey=mesKey;
      refreshTabs();
      showTable(data);
      document.getElementById("uploadSection").style.display="none";
    }catch(ex){
      document.getElementById("loadMsg").innerHTML="";
      errEl.textContent="Error: "+ex.message;
      errEl.style.display="block";
    }
  };
  reader.readAsBinaryString(file);
}

function parseRows(rows){
  // Fixed structure verified in Python:
  // Row 0: headers (AVANCE at col5, MES at col6, DIAS at col7)
  // Row 1: values
  // Row 3: "Punto de Venta:" at col2, PDV name at col3
  // Row 8: table header (name at col2, Meta col3, Avance col4, Proyeccion col5, FALTA col6, VentaDiaria col7, ProyFinal col8)
  // Row 9: empty
  // Row 10+: data (col2=name, col3=meta, col4=av, col5=pct, col6=falta, col7=vd, col8=pf, col9=estado)

  let avance="", mes="", dias="", pdvLabel="";

  // Get AVANCE/MES/DIAS
  const r0=rows[0]||[], r1=rows[1]||[];
  for(let j=0;j<r0.length;j++){
    const v=String(r0[j]||"").trim().toUpperCase();
    if(v==="AVANCE") avance=String(r1[j]||"").trim();
    if(v==="MES") mes=String(r1[j]||"").trim();
    if(v==="DIAS") dias=String(r1[j]||"").trim();
  }

  // Get PDV label - col[1] after "Punto de Venta:"
  for(let i=2;i<6;i++){
    const r=rows[i]||[];
    for(let j=0;j<r.length;j++){
      if(String(r[j]||"").toLowerCase().includes("punto de venta")){
        for(let k=j+1;k<r.length;k++){
          const v=String(r[k]||"").trim();
          if(v&&!v.toLowerCase().includes("asesor")){pdvLabel=v;break;}
        }
      }
    }
  }

  const CATS=["prepago","postpago","residencial","otros"];
  const struct={prepago:[],postpago:[],residencial:[],otros:[]};
  let curCat="prepago", totalRow=null;

  // SheetJS strips leading empty cols, so col[0]=name, col[1]=meta, col[2]=av, col[3]=pct, col[4]=falta, col[5]=vd, col[6]=pf, col[7]=estado
  for(let i=10;i<rows.length;i++){
    const r=rows[i]||[];
    const name=String(r[0]||"").trim();
    if(!name) continue;
    const nl=name.toLowerCase().trim();

    if(CATS.includes(nl)||nl.startsWith("residencial")){
      curCat=nl.startsWith("residencial")?"residencial":nl;
      continue;
    }

    if(nl.startsWith("total")){
      totalRow={
        meta:r[1], av:r[2], pct:r[3],
        falta:r[4], vd:r[5], pf:r[6],
        estado:String(r[7]||"")
      };
      continue;
    }

    if(nl.includes("coordinador")||nl.includes("jefe")||nl.includes("gerente")) continue;
    if(typeof r[1]!=="number"&&typeof r[2]!=="number") continue;

    struct[curCat].push({
      name,
      meta:r[1], av:r[2], pct:r[3],
      falta:r[4], vd:r[5], pf:r[6],
      estado:String(r[7]||"")
    });
  }

  return{struct,avance,mes,dias,pdvLabel,totalRow};
}

function fmtPct(v){
  if(v===""||v===undefined||v===null||v===" ") return "-";
  const n=parseFloat(String(v));
  if(isNaN(n)) return "-";
  // Values are stored as decimals: 1.374 = 137.4%
  return (n*100).toFixed(1)+"%";
}

function fmt(v){
  if(v===""||v===undefined||v===null||v===" ") return "-";
  const n=parseFloat(String(v));
  if(isNaN(n)) return String(v);
  return n%1===0?n.toLocaleString("es-PE"):n.toLocaleString("es-PE",{maximumFractionDigits:2});
}

function getTag(estado){
  const e=String(estado||"").toLowerCase();
  if(e.includes("excelente")) return{cls:"t-exc",dot:"dg",lbl:"Excelente ✅"};
  if(e.includes("regular")) return{cls:"t-reg",dot:"dy",lbl:"Vamos regular 🟡"};
  return{cls:"t-pun",dot:"dr",lbl:"Ponle punche 🔴"};
}

function showTable(data){
  document.getElementById("loadMsg").innerHTML="";
  document.getElementById("infoRow").innerHTML=
    `<div class="chip">Avance día: <strong>${data.avance||"-"}</strong></div>
     <div class="chip">Mes: <strong>${data.mes||"-"}</strong></div>
     <div class="chip">Días del mes: <strong>${data.dias||"-"}</strong></div>
     <div class="chip">PDV: <strong>${data.pdvLabel||curTienda}</strong></div>`;

  const CATNAMES={prepago:"Prepago",postpago:"Postpago",residencial:"Residencial",otros:"Otros"};
  let html=`<div class="table-card"><div class="table-wrap"><table>
    <thead><tr>
      <th style="text-align:left;min-width:200px">Producto</th>
      <th>Meta</th><th>Avance</th><th>Proyección</th>
      <th>Falta</th><th>Venta Diaria<br>Para Llegar</th>
      <th>Proyección Final</th><th>Estado</th>
    </tr></thead><tbody>`;

  for(const cat of ["prepago","postpago","residencial","otros"]){
    const prods=data.struct[cat];
    if(!prods||!prods.length) continue;
    html+=`<tr class="cat-row"><td colspan="8">${CATNAMES[cat]}</td></tr>`;
    for(const p of prods){
      const t=getTag(p.estado);
      const fv=parseFloat(p.falta);
      const fc=(!isNaN(fv)&&fv<=0)?"falta-g":"falta-r";
      html+=`<tr>
        <td>${p.name}</td>
        <td>${fmt(p.meta)}</td>
        <td>${fmt(p.av)}</td>
        <td><span style="display:inline-flex;align-items:center;gap:4px"><span class="dot ${t.dot}"></span>${fmtPct(p.pct)}</span></td>
        <td class="${fc}">${fmt(p.falta)}</td>
        <td>${fmt(p.vd)}</td>
        <td>${fmt(p.pf)}</td>
        <td><span class="tag ${t.cls}">${t.lbl}</span></td>
      </tr>`;
    }
  }

  if(data.totalRow){
    const t=getTag(data.totalRow.estado);
    html+=`<tr class="total-row">
      <td>TOTAL</td>
      <td>${fmt(data.totalRow.meta)}</td>
      <td>${fmt(data.totalRow.av)}</td>
      <td>${fmtPct(data.totalRow.pct)}</td>
      <td>${fmt(data.totalRow.falta)}</td>
      <td>${fmt(data.totalRow.vd)}</td>
      <td>${fmt(data.totalRow.pf)}</td>
      <td><span class="tag ${t.cls}">${t.lbl}</span></td>
    </tr>`;
  }

  html+=`</tbody></table></div>
  <div style="padding:1rem;text-align:right">
    <button class="btn-out" onclick="clearTable()">↺ Cargar otro mes</button>
  </div></div>`;

  document.getElementById("tableSection").innerHTML=html;
}

function refreshTabs(){
  const h=cache[curTienda]||{};
  const keys=Object.keys(h);
  const cont=document.getElementById("mesTabs");
  if(!keys.length){cont.innerHTML="";return;}
  cont.innerHTML=keys.map(k=>`<button class="mes-tab${k===curMesKey?" active":""}" onclick="selectMes('${k}')">${h[k].mes||k} — día ${h[k].avance||"?"}</button>`).join("");
}

function selectMes(key){
  curMesKey=key;
  const data=cache[curTienda]&&cache[curTienda][key];
  if(data){
    showTable(data);
    document.getElementById("uploadSection").style.display="none";
    refreshTabs();
  }
}

function clearTable(){
  document.getElementById("tableSection").innerHTML="";
  document.getElementById("infoRow").innerHTML="";
  document.getElementById("uploadSection").style.display="block";
  document.getElementById("fileIn").value="";
  document.getElementById("loadMsg").innerHTML="";
  document.getElementById("uploadErr").style.display="none";
}
</script>
</body>
</html>
