<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avance por Vendedor – Blazel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}
.wrap{max-width:1100px;margin:0 auto;padding:1.25rem 1rem}
.head{background:#fff;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.head h2{font-size:18px;font-weight:700;color:#cc0000}
.head .sub{font-size:12px;color:#666;margin-top:2px}
.mes-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.mes-tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555}
.mes-tab.active{border-color:#cc0000;background:#cc0000;color:#fff}
.pick{background:#fff;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.pick label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.pick select{width:100%;max-width:320px;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;background:#fafafa;color:#1a1a2e}
.pick select:focus{outline:none;border-color:#cc0000;background:#fff}
.vh{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.vchip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fafafa;color:#555;user-select:none}
.vchip.on{border-color:#cc0000;background:#cc0000;color:#fff}
.info-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.chip{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:6px 14px;font-size:12px;color:#666}
.chip strong{color:#1a1a2e;font-weight:600}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1rem}
.kpi{background:#fff;border-radius:14px;padding:1rem 1.25rem;border-left:4px solid #cc0000}
.kpi .lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
.kpi .val{font-size:24px;font-weight:800;color:#1a1a2e;margin-top:4px}
.kpi .sub{font-size:12px;color:#666;margin-top:2px}
.kpi.green{border-left-color:#22a843}.kpi.amber{border-left-color:#e0a82e}.kpi.red{border-left-color:#cc0000}
.table-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:1rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
thead tr{background:#1a1a2e}
thead th{padding:10px 12px;color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:center;white-space:nowrap}
thead th:first-child{text-align:left;padding-left:16px}
.cat-row td{background:#2d3561;color:#fff !important;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:7px 16px}
tbody tr:not(.cat-row){border-bottom:1px solid #f0f0f0}
td{padding:9px 12px;text-align:center;color:#333}
td:first-child{text-align:left;padding-left:16px;font-weight:500;color:#1a1a2e}
.total-row td{background:#1a1a2e;color:#fff;font-weight:700}
.tag{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
.t-exc{background:#e6f4ea;color:#1a7a33}.t-reg{background:#fff8e1;color:#b07000}.t-pun{background:#fdecea;color:#cc0000}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dg{background:#22c55e}.dy{background:#f59e0b}.dr{background:#ef4444}
.falta-r{color:#cc0000;font-weight:600}.falta-g{color:#22a843;font-weight:600}
.empty{background:#fff;border-radius:14px;padding:2rem;text-align:center;color:#888;font-size:14px}
@media(max-width:600px){.wrap{padding:1rem .5rem}td,th{padding:7px 8px;font-size:12px}.kpi .val{font-size:20px}}
.gauges{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;background:#fff;border-radius:14px;padding:16px;margin-bottom:1rem}
.gauge{text-align:center;background:#fafbfc;border:1px solid #eef0f3;border-radius:12px;padding:14px 8px}
.glbl{font-size:13px;font-weight:700;color:#1a1a2e;margin-top:-2px}
.mnums{font-size:11px;color:#666;margin-top:4px}
.mnums b{color:#1a1a2e}
@media(max-width:600px){.gauges{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function toNum(x){if(typeof x==='number')return x;if(x==null)return 0;let s=String(x).replace(/s\/\.?/ig,'').replace(/%/g,'').replace(/\s/g,'').replace(/,/g,'');s=s.replace(/[^0-9.\-]/g,'');const n=parseFloat(s);return isNaN(n)?0:n;}

function parseStackedRows(rows,mes,anio){
  let dias=toNum((rows[2]||[])[6])||31;
  if(!mes){ mes=MES_MAP[String((rows[2]||[])[7]||'').toLowerCase()]||0; }
  const recs=[]; let curCat=null;
  for(let i=0;i<rows.length;i++){
    const r=rows[i]||[]; const b=r[1],c=r[2],d=r[3];
    const ds=(d==null)?'':String(d).trim();
    if(ds && (b==null||b==='')&&(c==null||c==='')&&ds!=='TOTAL'){ curCat=canonCat(ds); continue; }
    const tipo=r[1], pdv=r[2], ases=r[3];
    if(!curCat||tipo==null||tipo==='')continue;
    const tu=String(tipo).toUpperCase(); if(tu==='TOTAL'||tu==='TIPO')continue;
    if(typeof ases!=='string'||!ases.trim())continue;
    recs.push({a:anio,m:mes,d:dias,dm:DIAS_MES[mes]||30,c:curCat,t:String(tipo).trim(),ti:canonTienda(pdv),n:ases.trim(),av:toNum(r[4]),ob:toNum(r[5])});
  }
  return recs;
}
async function fetchJSON(u){const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}

function fmt(v){const n=parseFloat(v);if(isNaN(n))return "-";return n%1===0?n.toLocaleString("es-PE"):n.toLocaleString("es-PE",{maximumFractionDigits:2});}

function rowsFor(mes,ti,vend){return DATA.filter(r=>r.m===mes&&r.ti===ti&&r.n===vend);}

function fillTiendas(){
  const tiendas=[...new Set(DATA.filter(r=>r.m===curMes).map(r=>r.ti))].sort();
  const sel=document.getElementById("tiendaSel");
  if(!curTienda||!tiendas.includes(curTienda)) curTienda=tiendas[0]||"";

  sel.onchange=()=>{curTienda=sel.value;curVend="";fillVend();};
  fillVend();

  const vends=[...new Set(DATA.filter(r=>r.m===curMes&&r.ti===curTienda).map(r=>r.n))].sort();

function gauge(label,pct,meta,av){
  pct=isFinite(pct)?pct:0; const fl=Math.max(0,Math.min(1,pct));
  const cl=pct>=1?'#22a843':(pct>=0.8?'#e0a82e':'#cc0000');

  const nums=(meta!==undefined)?`<div class="mnums">Cuota <b>${fmt(meta)}</b> · Av <b>${fmt(av)}</b></div>`:'';
  return `<div class="gauge"><svg viewBox="0 0 90 90" width="84" height="84">
    <circle cx="45" cy="45" r="${r}" fill="none" stroke="#eceff3" stroke-width="9"/>
    <circle cx="45" cy="45" r="${r}" fill="none" stroke="${cl}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${dash.toFixed(1)} ${c.toFixed(1)}" transform="rotate(-90 45 45)"/>
    <text x="45" y="42" text-anchor="middle" font-size="17" font-weight="800" fill="#1a1a2e">${(pct*100).toFixed(0)}%</text>
    <text x="45" y="58" text-anchor="middle" font-size="8" fill="#999">proy</text>
  </svg><div class="glbl">${label}</div>${nums}</div>`;
}
function gaugesRowV(byC,cf){

    med('Portab. Postpago',["Portabilidad Postpago","Portabiilidad Postpago"])+

    med('HFC',["HFC"])+
  `</div>`;
}

function kpi(lbl,val,sub,cls){return `<div class="kpi ${cls||""}"><div class="lbl">${lbl}</div><div class="val">${val}</div><div class="sub">${sub}</div></div>`;}

renderMes(); fillTiendas(); loadLive();
</script>
