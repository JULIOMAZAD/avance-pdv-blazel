<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECARGAS BLAZEL · Tablero de Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#D81F26; --rojo2:#B5151B; --negro:#1B1B1F; --gris:#8E939B; --grisC:#D9DCE1;
  --paper:#F6F6F8; --card:#FFFFFF; --ink:#1B1B1F; --ink2:#6B7077; --line:#ECEDF0;
  --verde:#13A05F; --ambar:#E6A817;
  --sombra:0 2px 12px rgba(20,20,30,.06);
  --verde-bg:#E6F6EE; --ambar-bg:#FBF3DC; --rojo-bg:#FCE9E8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);font-size:14px}
.num{font-variant-numeric:tabular-nums}

header{background:var(--negro);color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:62px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:baseline;gap:8px}
.logo .b{font-family:'Barlow Condensed';font-weight:700;font-size:24px;letter-spacing:.5px}
.logo .r{color:var(--rojo)}
.logo .sub{font-size:11px;color:#9AA3B0;letter-spacing:1.5px;text-transform:uppercase}
.spacer{flex:1}
#selMes{background:#2A2A30;color:#fff;border:1px solid #3A3A42;border-radius:8px;padding:8px 12px;font-family:'Inter';font-size:13px;font-weight:600;cursor:pointer}
#btnDrop{background:var(--rojo);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap}
#btnDrop:hover{background:var(--rojo2)}
#fileInput{display:none}
#fechaData{font-size:11px;color:#9AA3B0;white-space:nowrap}

nav{background:#26262C;display:flex;overflow-x:auto;padding:0 12px;position:sticky;top:62px;z-index:49}
nav button{background:none;border:none;color:#B6BEC9;padding:13px 18px 10px;font-family:'Barlow Condensed';font-weight:600;font-size:16px;letter-spacing:1px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;text-transform:uppercase}
nav button.on{color:#fff;border-color:var(--rojo)}

main{max-width:1180px;margin:0 auto;padding:20px 16px 60px}
.tab{display:none}.tab.on{display:block}

.grid{display:grid;gap:12px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(205px,1fr));margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sombra)}

/* KPI estilo infografía: chip circular + cifra + vs mes anterior */
.kpi{display:flex;gap:12px;align-items:flex-start}
.chip{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip svg{width:20px;height:20px;fill:#fff}
.ch-rojo{background:var(--rojo)} .ch-negro{background:var(--negro)} .ch-gris{background:var(--gris)} .ch-verde{background:var(--verde)}
.kpi .lbl{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink2);font-weight:700}
.kpi .val{font-family:'Barlow Condensed';font-weight:700;font-size:30px;line-height:1.05;margin-top:2px}
.kpi .val small{font-size:16px;color:var(--ink2);font-weight:600}
.vs{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:12px;padding:2px 8px;margin-top:6px}
.vs.up{background:var(--verde-bg);color:var(--verde)}
.vs.dn{background:var(--rojo-bg);color:var(--rojo)}
.vs.eq{background:#EEF0F3;color:var(--ink2)}
.vs .txt{font-weight:500;color:var(--ink2)}

/* fila de donas */
.donas{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:14px}
.dona{display:flex;gap:16px;align-items:center}
.dona .dch{position:relative;width:130px;height:130px;flex-shrink:0}
.dona .info .t{font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink2);font-weight:700}
.dona .info .big{font-family:'Barlow Condensed';font-weight:700;font-size:38px;line-height:1.05}
.stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px}
.stats .s .sl{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink2);font-weight:700}
.stats .s .sv{font-family:'Barlow Condensed';font-weight:700;font-size:21px;line-height:1.1}

h2{font-family:'Barlow Condensed';font-weight:600;font-size:20px;letter-spacing:.5px;text-transform:uppercase;margin:18px 0 10px;color:var(--ink);border-left:4px solid var(--rojo);padding-left:10px}
h2 .tag{font-size:12px;color:var(--ink2);font-family:'Inter';font-weight:500;text-transform:none;letter-spacing:0}
.secHead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:22px 0 10px}
.secHead h2{margin:0}
.secHead select{border:1px solid var(--grisC);border-radius:8px;padding:7px 10px;font-family:'Inter';font-size:13px;background:#fff;font-weight:600;color:var(--ink);cursor:pointer}

/* Dropdown multi-select de meses */
.msel{position:relative;display:inline-block}
.msel .btn{border:1px solid var(--grisC);border-radius:8px;padding:7px 12px;background:#fff;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:8px;min-width:150px;justify-content:space-between}
.msel .btn .arr{color:var(--ink2);font-size:10px}
.msel .panel{position:absolute;top:calc(100% + 4px);left:0;z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(20,20,30,.14);padding:8px;min-width:200px;max-height:280px;overflow:auto;display:none}
.msel.open .panel{display:block}
.msel .top{display:flex;gap:14px;padding:4px 8px 8px;border-bottom:1px solid var(--line);margin-bottom:6px}
.msel .top span{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--rojo);cursor:pointer;text-transform:uppercase}
.msel .top span:hover{text-decoration:underline}
.msel label{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.msel label:hover{background:#FAFAFB}
.msel input[type=checkbox]{appearance:none;-webkit-appearance:none;width:17px;height:17px;border:2px solid var(--grisC);border-radius:5px;cursor:pointer;position:relative;flex-shrink:0}
.msel input[type=checkbox]:checked{background:var(--rojo);border-color:var(--rojo)}
.msel input[type=checkbox]:checked::after{content:'✓';position:absolute;color:#fff;font-size:12px;font-weight:700;top:-2px;left:2px}

.twrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--sombra)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--negro);color:#fff;text-align:right;padding:10px 12px;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--line);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:8px 12px;border-bottom:1px solid #F0F2F4;text-align:right;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.tot td{font-weight:700;background:#FAFAFB;border-top:2px solid var(--line)}
tr.cur td{background:#FDF1F1}
.dom td:first-child{color:var(--rojo);font-weight:600}
.pill{display:inline-block;padding:3px 10px;border-radius:14px;font-weight:700;font-size:12px}
.pv{background:var(--verde-bg);color:var(--verde)}
.pa{background:var(--ambar-bg);color:#B5840F}
.pr{background:var(--rojo-bg);color:var(--rojo)}
.pn{background:#EEF0F3;color:var(--ink2)}
.up{color:var(--rojo);font-weight:700}
.dn{color:var(--verde);font-weight:700}

.chartbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--sombra)}
.chartbox .ch{position:relative;height:300px}
.two{grid-template-columns:1fr 1fr}
@media(max-width:820px){.two{grid-template-columns:1fr}}
.opeSide{display:grid;grid-template-columns:470px 1fr;gap:12px;align-items:stretch}
@media(max-width:820px){.opeSide{grid-template-columns:1fr}}
.opeSide .dona{height:100%;display:flex;flex-direction:column;justify-content:center}

#dropZone{position:fixed;inset:0;background:rgba(20,20,26,.92);z-index:100;display:none;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:12px}
#dropZone.on{display:flex}
#dropZone .big{font-family:'Barlow Condensed';font-size:34px;font-weight:700}
#dropZone .box{border:2px dashed #4A5568;border-radius:16px;padding:60px 80px;text-align:center}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--negro);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;display:none;z-index:101;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.note{font-size:12px;color:var(--ink2);margin:8px 2px}
/* Barra de filtro superior (estilo masivo, oscura) */
.fbar{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;padding:14px 26px;background:linear-gradient(180deg,#1B1B1F,#141418);border-bottom:1px solid #2a2a31}
.fbar .fg{display:flex;flex-direction:column;gap:5px}
.fbar .fl{font-size:10px;font-weight:700;letter-spacing:1px;color:#9a9aa2;text-transform:uppercase}
.fbar select.dk{border:1px solid #3a3a42;border-radius:8px;padding:7px 12px;background:#26262c;color:#fff;font-family:'Inter';font-size:13px;font-weight:600;cursor:pointer;min-width:110px}
.msel.dk .btn{background:#26262c;border-color:#3a3a42;color:#fff}
.msel.dk .btn .arr{color:#9a9aa2}
.msel.dk .panel{background:#1f1f25;border-color:#33333b;box-shadow:0 10px 28px rgba(0,0,0,.45);z-index:200}
.msel.dk .top{border-color:#33333b}
.msel.dk label{color:#e8e8ec}
.msel.dk label:hover{background:#2a2a31}
.msel.dk input[type=checkbox]{border-color:#55555f}
.mesant{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.mesant .mal{font-size:11px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.mesant .mav{font-family:'Barlow Condensed';font-size:21px;font-weight:600;color:var(--ink);line-height:1}
#btnMasivo{background:#fff;color:var(--negro);border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;text-decoration:none;font-family:'Inter';display:inline-flex;align-items:center;gap:6px}
#btnMasivo:hover{background:#e8e8ec}
#loginOverlay{position:fixed;inset:0;background:#0E0F13;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
#loginOverlay .lcard{width:100%;max-width:380px;background:#1A1C22;border:1px solid #2E323C;border-radius:16px;padding:30px 28px}
#loginOverlay .lbrand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:22px}
#loginOverlay .lmark{width:42px;height:42px;border-radius:11px;background:var(--rojo);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
#loginOverlay h2{color:#fff;font-size:18px;text-align:center;margin:0 0 4px;font-family:'Inter'}
#loginOverlay p.s{color:#9AA0AA;font-size:13px;text-align:center;margin:0 0 20px}
#loginOverlay label{display:block;font-size:12px;color:#9AA0AA;margin:0 0 6px 2px}
#loginOverlay input{width:100%;background:#23262E;border:1px solid #2E323C;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;margin-bottom:14px;outline:none;font-family:'Inter'}
#loginOverlay input:focus{border-color:var(--rojo)}
#loginOverlay button{width:100%;background:var(--rojo);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter'}
#loginOverlay .lerr{color:var(--rojo);font-size:13px;min-height:18px;margin-top:8px;text-align:center}
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="lcard">
    <div class="lbrand"><div class="lmark">B</div><div style="color:#fff;font-weight:700;font-size:18px;font-family:'Inter'">RECARGAS BLAZEL</div></div>
    <h2>Ingreso al sistema</h2>
    <p class="s">Usuarios autorizados</p>
    <label for="luser">Usuario</label>
    <input id="luser" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="usuario">
    <label for="lpass">Clave</label>
    <input id="lpass" type="password" autocomplete="current-password" placeholder="clave">
    <button id="lbtn">Entrar</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<header>
  <div class="logo"><span class="b">RECARGAS<span class="r"> BLAZEL</span></span><span class="sub">Tablero de control</span></div>

</header>

<div class="fbar" id="fbar"></div>

<nav>
  <button data-t="resumen" class="on">Resumen</button>
  <button data-t="operativos">Operativos</button>
  <button data-t="desabasto">Desabasto</button>
  <button data-t="diario">Avance diario</button>
  <button data-t="distritos">Distritos</button>
  <button data-t="canales">Canales</button>
  <button data-t="evolutivo">Evolutivo</button>
  <button data-t="asesores">Asesores</button>

</nav>

<main>

const barLabels = {
  id:'barLabels',
  afterDatasetsDraw(chart){
    const o = chart.options.plugins && chart.options.plugins.barLabels;
    if(!o || !o.on) return;
    const {ctx} = chart;
    ctx.save();
    ctx.font = '700 11px "Barlow Condensed", sans-serif';
    ctx.textAlign = o.horizontal ? 'left' : 'center';
    ctx.textBaseline = o.horizontal ? 'middle' : 'bottom';
    const dss = chart.config.data.datasets;
    for(let di=0; di<dss.length; di++){
      const meta = chart.getDatasetMeta(di);
      if(meta.hidden || meta.type==='line' || dss[di].noLabel) continue;
      ctx.fillStyle = dss[di].labelColor || '#1B1B1F';
      meta.data.forEach((bar,i)=>{
        let p; try{ p = meta.controller.getParsed(i); }catch(e){ return; }
        const v = o.horizontal ? (p && p.x) : (p && p.y);
        if(typeof v !== 'number' || isNaN(v)) return;
        const fmt = o.fmt==='k' ? fK : o.fmt==='n' ? fN : String;
        const txt = fmt(v);
        if(o.horizontal) ctx.fillText(txt, bar.x+5, bar.y);
        else ctx.fillText(txt, bar.x, bar.y-4);
      });
    }
    ctx.restore();
  }
};
const donaCentro = {
  id:'donaCentro',
  afterDraw(chart){
    const o = chart.options.plugins.donaCentro;
    if(!o || !o.texto) return;
    const {ctx, chartArea:{width,height,left,top}} = chart;
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='700 26px Barlow Condensed'; ctx.fillStyle=o.color||'#1B1B1F';
    ctx.fillText(o.texto, left+width/2, top+height/2 - (o.sub?7:0));
    if(o.sub){ ctx.font='600 10px Inter'; ctx.fillStyle='#6B7077'; ctx.fillText(o.sub, left+width/2, top+height/2+13); }
    ctx.restore();
  }
};
Chart.register(barLabels, donaCentro);

const MESN = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Setiembre','Octubre','Noviembre','Diciembre'];
const DIAN = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const fS = n => n==null ? '—' : 'S/ ' + n.toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0});
const fS2 = n => n==null ? '—' : 'S/ ' + n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fN = n => n==null ? '—' : n.toLocaleString('es-PE',{maximumFractionDigits:0});
const fP = n => n==null ? '—' : (n*100).toLocaleString('es-PE',{maximumFractionDigits:1}) + '%';
const fK = n => n==null ? '' : n>=1000 ? (n/1000).toLocaleString('es-PE',{maximumFractionDigits:1})+'k' : fN(n);
const dow = f => new Date(f+'T12:00:00').getDay();
const semClass = p => p==null ? 'pn' : p>=1 ? 'pv' : p>=0.85 ? 'pa' : 'pr';
const semColor = p => p==null ? '#9AA3B0' : p>=1 ? '#13A05F' : p>=0.85 ? '#E6A817' : '#D81F26';
const ICO = {
  meta:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10h-3a7 7 0 1 1-7-7V2zm0 5a5 5 0 1 0 5 5h-3a2 2 0 1 1-2-2V7z"/></svg>',
  dinero:'<svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>',
  tienda:'<svg viewBox="0 0 24 24"><path d="M3 9l1.5-5h15L21 9v2a3 3 0 0 1-6 0 3 3 0 0 1-6 0 3 3 0 0 1-6 0V9zm1 6h16v6H4v-6z"/></svg>',
  cal:'<svg viewBox="0 0 24 24"><path d="M7 2v3M17 2v3M3 8h18M5 5h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg>',
  rayo:'<svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>',
  flecha:'<svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 7-8M20 7h-5m5 0v5" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};
const vsChip = (cur, prev, fmt, invertir=false) => {
  if(cur==null || prev==null) return '';
  const d = cur - prev;
  const pos = invertir ? d<0 : d>0;
  const cls = d===0 ? 'eq' : pos ? 'up' : 'dn';
  const flecha = d===0 ? '＝' : d>0 ? '▲' : '▼';
  return `<span class="vs ${cls}">${flecha} ${fmt(Math.abs(d))} <span class="txt">vs mes ant.</span></span>`;
};
const mesAntBlock = (label, prevVal, fmt, chip) => {
  if(prevVal==null) return chip||'';
  return `<div class="mesant"><span class="mal">${label}</span><span class="mav">${fmt(prevVal)}</span>${chip||''}</div>`;
};

function mesesDisponibles(){
  const s = new Set(DATA.daily.map(x=>x.f.slice(0,7)));
  (DATA.bloques||[]).forEach(b=>s.add(`${b.y}-${String(b.m).padStart(2,'0')}`));
  return [...s].sort();
}
function diasMes(ym){ return DATA.daily.filter(x=>x.f.startsWith(ym)); }
function cuotaDe(ym){ const [y,m]=ym.split('-').map(Number); return DATA.cuotas.find(c=>c.y===y&&c.m===m)||null; }
function bloqueDe(ym){ const [y,m]=ym.split('-').map(Number); return (DATA.bloques||[]).find(b=>b.y===y&&b.m===m)||null; }
function ymPrev(ym){ let [y,m]=ym.split('-').map(Number); m--; if(m<1){m=12;y--;} return `${y}-${String(m).padStart(2,'0')}`; }

function resumenMes(ym){
  const dias = diasMes(ym);
  const [y,m] = ym.split('-').map(Number);
  const b = bloqueDe(ym);
  const c = cuotaDe(ym);
  let dCal = new Date(y, m, 0).getDate();
  let sig = dias.reduce((s,x)=>s+(x.sig||0),0);
  let dt = dias.filter(x=>x.act>0).length;
  let cuota = b && b.cuota!=null ? b.cuota : (c ? c.cuota : null);
  if(b && b.act!=null){ sig = b.act; }
  if(b && b.dt_act!=null && b.dt_act>0){ dt = b.dt_act; }
  if(b && b.du_act!=null && b.du_act>0){ dCal = b.du_act; }
  const act = dias.reduce((s,x)=>s+(x.act||0),0);
  const proy = b && b.proy!=null ? b.proy : (dt>0 ? sig/dt*dCal : null);
  const pct = (cuota && proy!=null) ? proy/cuota : null;
  const pctReal = cuota ? sig/cuota : null;
  const promDia = dt>0 ? sig/dt : null;
  const falta = cuota!=null ? cuota - sig : null;
  const restantes = Math.max(0, dCal - dt);
  const reqDia = (falta!=null && falta>0 && restantes>0) ? falta/restantes : null;
  return {ym,y,m,dCal,dt,act,sig,cuota,proy,pct,pctReal,promDia,falta,reqDia,restantes,bloque:b,oficial:!!(b&&b.act!=null)};
}

function tabs(){
  document.querySelectorAll('nav button').forEach(bt=>bt.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    bt.classList.add('on');
    document.getElementById('tab-'+bt.dataset.t).classList.add('on');
    requestAnimationFrame(()=>Object.values(charts).forEach(c=>{try{c.resize();c.draw();}catch(e){}}));
  });
}
function killChart(id){ if(charts[id]){charts[id].destroy(); delete charts[id];} }
function mkChart(id, cfg){ killChart(id); const el=document.getElementById(id); if(el) charts[id]=new Chart(el,cfg); }

// Estado de meses marcados por sección (clave: 'cuota','pdv','evo'); valor: Set de m (1-12) o null = todos
const mesesSel = { cuota:null, pdv:null, evo:null, dist:null, ases:null };
// Construye un dropdown de meses con checkboxes. mesesDisp = array de números de mes presentes en el año.
function dropMeses(seccion, mesesDisp, onChange){
  const sel = mesesSel[seccion];
  const activos = sel || new Set(mesesDisp);
  const id = 'msel_'+seccion;
  const label = (sel && sel.size<mesesDisp.length) ? `${activos.size} meses` : 'Todos los meses';
  const items = mesesDisp.map(m=>`<label><input type="checkbox" data-m="${m}" ${activos.has(m)?'checked':''}> ${MESN[m]}</label>`).join('');
  setTimeout(()=>{
    const cont = document.getElementById(id);
    if(!cont) return;
    const btn = cont.querySelector('.btn');
    btn.onclick = e=>{ e.stopPropagation(); document.querySelectorAll('.msel.open').forEach(x=>{if(x!==cont)x.classList.remove('open')}); cont.classList.toggle('open'); };
    cont.querySelectorAll('input[type=checkbox]').forEach(chk=>{
      chk.onchange = ()=>{
        const set = new Set([...cont.querySelectorAll('input:checked')].map(c=>+c.dataset.m));
        mesesSel[seccion] = set.size===mesesDisp.length ? null : set;
        onChange();
      };
    });
    cont.querySelector('.selTodos').onclick = ()=>{ mesesSel[seccion]=null; onChange(); };
    cont.querySelector('.selNada').onclick = ()=>{ mesesSel[seccion]=new Set(); onChange(); };
  },0);
  return `<div class="msel" id="${id}"><div class="btn">${label} <span class="arr">▼</span></div>
    <div class="panel"><div class="top"><span class="selTodos">Todos</span><span class="selNada">Ninguno</span></div>${items}</div></div>`;
}
// cerrar dropdowns al hacer clic fuera
document.addEventListener('click', ()=>document.querySelectorAll('.msel.open').forEach(x=>x.classList.remove('open')));
// filtra una lista de items {m:...} según la selección de la sección
function filtraMeses(seccion, items){
  const sel = mesesSel[seccion];
  if(!sel) return items;
  return items.filter(x=>sel.has(x.m));
}
function dona(id, frac, color, texto, sub){
  const v = Math.max(0, Math.min(1, frac==null?0:frac));
  mkChart(id,{type:'doughnut',data:{datasets:[{data:[v,1-v],backgroundColor:[color,'#ECEDF0'],borderWidth:0,borderRadius:6}]},
    options:{cutout:'72%',maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false},donaCentro:{texto,sub,color}}}});
}

function rComparativo(meses){
  const el=document.getElementById('tab-resumen');
  const _bls=(DATA.bloques||[]);
  const _last=_bls.length?_bls.reduce((a,c)=>((c.y>a.y)||(c.y===a.y&&c.m>a.m))?c:a):null;
  const D=meses.map(ym=>{
    const r=resumenMes(ym); const [y,m]=ym.split('-').map(Number);
    const esAct=!!(_last&&y===_last.y&&m===_last.m);
    const opeCuota=r.bloque?r.bloque.pdv_ope:null;
    let opeAv=r.bloque?r.bloque.pdv_avance:null;
    if(esAct) opeAv=EMB_MEDIDAS.ope.dist.filter(d=>distOK(d.d)).reduce((s,d)=>s+d.ope,0);
    const opePct=opeCuota?100*(opeAv||0)/opeCuota:null;
    let debPct=null;
    if(esAct){ const f=EMB_MEDIDAS.deb.dist.filter(d=>distOK(d.d)); const c=f.reduce((s,d)=>s+d.cli,0),n=f.reduce((s,d)=>s+d.deb,0); debPct=c?100*n/c:0; }
    return {ym, lbl:MESN[m], y, m, esAct, volCuota:r.cuota, volAv:r.sig,
            volPct:r.pctReal!=null?r.pctReal*100:null, opeCuota, opeAv, opePct, debPct};
  });
  const fp=v=>v==null?'—':v.toFixed(1)+'%';
  const fm=v=>v==null?'—':fS(v);
  const fnum=v=>v==null?'—':v.toLocaleString();
  const cols=D.map(d=>`<th>${d.lbl} ${d.y}</th>`).join('');
  const row=(label,get)=>`<tr><td>${label}</td>${D.map(d=>`<td class="num">${get(d)}</td>`).join('')}</tr>`;
  let h=`<h2>Comparativo mes vs mes <span class="tag">${D.length} meses seleccionados · desabasto solo en el mes actual</span></h2>`;
  h+=`<div class="card" style="padding:18px;margin-bottom:6px"><div style="height:300px;position:relative"><canvas id="cmpBar"></canvas></div></div>`;
  h+=`<h2>Volumen</h2><div class="twrap"><table><thead><tr><th>Mes</th>${cols}</tr></thead><tbody>${row('Cuota (S/)',d=>fm(d.volCuota))}${row('Avance (S/)',d=>fm(d.volAv))}${row('% avance',d=>fp(d.volPct))}</tbody></table></div>`;
  h+=`<h2>Operativos</h2><div class="twrap"><table><thead><tr><th>Mes</th>${cols}</tr></thead><tbody>${row('Cuota · nos piden',d=>fnum(d.opeCuota))}${row('Avance · hacemos',d=>fnum(d.opeAv))}${row('% cumplimiento',d=>fp(d.opePct))}</tbody></table></div>`;
  h+=`<h2>Desabasto <span class="tag">sin histórico mensual</span></h2><div class="twrap"><table><thead><tr><th>Mes</th>${cols}</tr></thead><tbody>${row('% desabasto',d=>d.esAct?fp(d.debPct):'—')}</tbody></table></div>`;
  el.innerHTML=h;
  mkChart('cmpBar',{type:'bar',
    data:{labels:D.map(d=>d.lbl),datasets:[
      {label:'Volumen %',data:D.map(d=>d.volPct),backgroundColor:'#D81F26',borderRadius:5},
      {label:'Operativos %',data:D.map(d=>d.opePct),backgroundColor:'#1B1B1F',borderRadius:5},
      {label:'Desabasto %',data:D.map(d=>d.debPct),backgroundColor:'#13A05F',borderRadius:5}
    ]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter'}}}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'%'}},x:{ticks:{font:{family:'Inter',weight:'600'}}}}}
  });
}

  if(mesesGlob && mesesGlob.size>=2){ return rComparativo([...mesesGlob].sort()); }

  const rp = resumenMes(ymPrev(ym));

  const b = r.bloque;
  const _bls=(DATA.bloques||[]);
  const _last=_bls.length?_bls.reduce((a,c)=>((c.y>a.y)||(c.y===a.y&&c.m>a.m))?c:a):null;

          <div class="s"><div class="sl">Proyección</div><div class="sv num" style="color:${semColor(r.pct)}">${fS(r.proy)}</div></div>
        </div>
        ${mesAntBlock('Cuota '+(rp.m?MESN[rp.m]:''), rp.cuota, fS, vsChip(r.cuota, rp.cuota, v=>fS(v)))}

    </div>
    <div class="card dona">
      <div class="dch"><canvas id="dnPdv"></canvas></div>
      <div class="info">
        <div class="t">PDV operativos · ${MESN[r.m]} ${r.y}</div>

        <div class="stats">

        ${debShow?`<div class="big" style="color:${debCol}">${debPct.toFixed(1)}% <span style="font-size:15px;color:var(--ink2)">de 10% meta</span></div>
        <div class="stats">
          <div class="s"><div class="sl">En desabasto</div><div class="sv num" style="color:var(--rojo)">${_dt.deb.toLocaleString()}</div></div>

  dona('dnCuota', r.pct, semColor(r.pct), r.pct==null?'—':(r.pct*100).toFixed(0)+'%', 'proyección');
  dona('dnPdv', pdvPct, semColor(pdvPct), pdvPct==null?'—':(pdvPct*100).toFixed(0)+'%', pdvDif==null?'':(pdvDif>=0?'+':'')+fN(pdvDif)+' PDV');

function drawCuotaMes(ym){
  const a = anioCuotaSel;
  const all = DATA.cuotas.slice().sort((x,z)=>(x.y-z.y)||(x.m-z.m));
  const csAll = all.filter(c=>c.y===a);
  const mesesDisp = csAll.map(c=>c.m);
  // montar dropdown de meses (marcar/desmarcar)
  const dc = document.getElementById('dropCuota');
  if(dc) dc.innerHTML = dropMeses('cuota', mesesDisp, ()=>drawCuotaMes(ym));
  const cs = filtraMeses('cuota', csAll);
  const difDe = c => {
    if(c.dif!=null) return c.dif;
    const i = all.findIndex(x=>x.y===c.y&&x.m===c.m);
    return i>0 && all[i-1].cuota!=null && c.cuota!=null ? c.cuota-all[i-1].cuota : null;
  };
  // Para el mes sin cierre final pero ya iniciado, tomar el avance acumulado (bloque PROYECCION o suma diaria)
  const avanceParcial = c => {
    const k = `${c.y}-${String(c.m).padStart(2,'0')}`;
    const b = bloqueDe(k);
    if(b && b.act!=null && b.act>0) return b.act;
    const dd = diasMes(k);
    if(dd.length){ const s = dd.reduce((t,x)=>t+(x.sig||0),0); return s>0?s:null; }
    return null;
  };
  // valor a mostrar como "cierre/avance" y si es parcial
  const valDe = c => {
    if(c.cierre!=null && c.cierre>0) return {v:c.cierre, parcial:false};
    const ap = avanceParcial(c);
    return ap!=null ? {v:ap, parcial:true} : {v:null, parcial:false};
  };
  const vals = cs.map(valDe);
  mkChart('chCuotaMes',{type:'bar',data:{labels:cs.map(c=>MESN[c.m].slice(0,3).toUpperCase()),datasets:[
    {type:'bar',label:'Cuota',data:cs.map(c=>c.cuota),backgroundColor:'#D9DCE1',borderRadius:5,labelColor:'#6B7077'},
    {type:'bar',label:'Cierre / avance',data:vals.map(x=>x.v),
      backgroundColor:'#D81F26',borderRadius:5,labelColor:'#1B1B1F'},
    {type:'line',label:'% Alcance',data:cs.map((c,i)=>c.cuota&&vals[i].v?Math.round(vals[i].v/c.cuota*1000)/10:null),yAxisID:'y2',borderColor:'#1B1B1F',borderDash:[5,4],tension:.3,pointRadius:3,pointBackgroundColor:'#1B1B1F'}
  ]},options:{maintainAspectRatio:false,animation:false,layout:{padding:{top:18}},
    plugins:{legend:{position:'bottom'},barLabels:{on:true,fmt:'k'}},
    scales:{y:{ticks:{callback:v=>'S/'+(v/1000)+'k'},grace:'8%'},y2:{position:'right',grid:{display:false},ticks:{callback:v=>v+'%'}}}}});
  const rows = cs.map((c,i)=>{
    const vv = vals[i];
    const p = c.cuota&&vv.v ? vv.v/c.cuota : null;
    const d = difDe(c);
    const dp = d!=null && c.cuota && (c.cuota-d)!==0 ? d/(c.cuota-d) : null;
    const cur = ym === `${c.y}-${String(c.m).padStart(2,'0')}`;
    const cierreTxt = vv.v==null ? '—' : vv.parcial ? `${fS(vv.v)} <span style="font-size:10px;color:var(--ink2);font-weight:600">en curso</span>` : fS(vv.v);
    const pillTxt = p==null ? '—' : fP(p) + (vv.parcial ? '*' : '');
    return `<tr class="${cur?'cur':''}"><td>${MESN[c.m]}${cur?' ◀':''}</td><td class="num">${c.dias!=null?fN(c.dias):'—'}</td>
    <td class="num"><b>${fS(c.cuota)}</b></td>
    <td class="num">${c.actdia!=null?fS(c.actdia):(c.cuota&&c.dias?fS(c.cuota/c.dias):'—')}</td>
    <td class="num ${d==null?'':d>0?'up':'dn'}">${d==null?'—':(d>0?'▲ +':'▼ −')+fS(Math.abs(d))}</td>
    <td class="num ${dp==null?'':dp>0?'up':'dn'}">${dp==null?'—':(dp>0?'+':'−')+(Math.abs(dp)*100).toFixed(1)+'%'}</td>
    <td class="num">${cierreTxt}</td>
    <td><span class="pill ${semClass(p)}">${pillTxt}</span></td></tr>`;
  }).join('');
  const hayParcial = vals.some(x=>x.parcial);
  document.getElementById('tCuotaMes').innerHTML = `<table><thead><tr>
    <th>Mes</th><th>Días</th><th>Cuota</th><th>Cuota diaria</th><th>Δ cuota vs mes ant.</th><th>Δ %</th><th>Cierre / avance</th><th>% Alcance</th>
  </tr></thead><tbody>${rows}</tbody></table>${hayParcial?'<p class="note" style="margin:8px 12px">* Mes en curso: la barra clara y el % marcado con asterisco son el avance acumulado a la fecha, no el cierre final.</p>':''}`;
}

  if(!b || !(b.distritos||[]).length){
    const con = (DATA.bloques||[]).filter(x=>(x.distritos||[]).length);
    const ult = con.length ? con[con.length-1] : null;
    el.innerHTML = `<h2>Distritos — ${MESN[m]} ${y}</h2><div class="card">No hay tabla de distritos para este mes en la hoja PROYECCION.${ult?` El último mes con detalle es <b>${MESN[ult.m]} ${ult.y}</b> — selecciónalo arriba.`:''}</div>`;
    return;
  }
  const sinD = !(distsGlob&&distsGlob.size);
  const ds = b.distritos.filter(d=>distOK(d.d)).map(d=>{
    const sinCuota = d.cuota==null || d.cuota<=1;
    const pct = sinCuota ? null : (d.proy!=null?d.proy:d.act)/d.cuota;
    return {...d, pct, sinCuota};
  }).sort((a2,b2)=>(b2.act||0)-(a2.act||0));
  const t = sinD ? (b.dist_total||{}) : {
    cuota: ds.reduce((s,d)=>s+(d.cuota||0),0),
    act: ds.reduce((s,d)=>s+(d.act||0),0),
    proy: ds.reduce((s,d)=>s+(d.proy||0),0)
  };
  const tp = t.cuota ? (t.proy!=null?t.proy:t.act)/t.cuota : null;
  const palette = ['#D81F26','#1B1B1F','#8E939B'];
  let rows = ds.map(d=>`<tr><td>${d.d}</td><td class="num">${d.sinCuota?'<span class="pill pn">S/C</span>':fS(d.cuota)}</td>
    <td class="num">${fS(d.act)}</td><td class="num">${fS(d.proy)}</td>
    <td><span class="pill ${semClass(d.pct)}">${d.pct==null?'—':fP(d.pct)}</span></td></tr>`).join('');
  el.innerHTML = `
  <h2>Proyección por distrito — ${MESN[m]} ${y}</h2>
  <div class="grid two">
    <div class="twrap"><table>
      <thead><tr><th>Distrito</th><th>Cuota</th><th>Activación</th><th>Proyección</th><th>%</th></tr></thead>
      <tbody>${rows}<tr class="tot"><td>TOTAL</td><td class="num">${fS(t.cuota)}</td><td class="num">${fS(t.act)}</td><td class="num">${fS(t.proy)}</td><td><span class="pill ${semClass(tp)}">${fP(tp)}</span></td></tr></tbody>
    </table></div>
    <div class="chartbox" style="margin:0"><div class="ch" style="height:${Math.max(280, ds.length*46)}px"><canvas id="chDist"></canvas></div></div>
  </div>
  <p class="note">El % usa la proyección del mes contra la cuota. S/C = sin cuota asignada. Verde ≥100%, ámbar 85–99%, rojo &lt;85%.</p>
  <div class="secHead"><h2>Comparativo mes a mes por distrito <span class="tag">activación SIN IGV</span></h2><span id="dropDist"></span></div>
  <div class="chartbox"><div class="ch" style="height:360px"><canvas id="chDistMulti"></canvas></div></div>
  ${detalleUsuarios(ym)}`;
  const bloquesAnio = (DATA.bloques||[]).filter(x=>x.y===y && (x.distritos||[]).length);
  mkChart('chDist',{type:'bar',data:{labels:ds.map(d=>d.d),datasets:[
    {label:'Activación',data:ds.map(d=>d.act),backgroundColor:ds.map((_,i)=>palette[i%3]),borderRadius:5,labelColor:'#1B1B1F'}
  ]},options:{indexAxis:'y',maintainAspectRatio:false,layout:{padding:{right:56}},
    plugins:{legend:{display:false},barLabels:{on:true,horizontal:true,fmt:'k'}},
    scales:{x:{ticks:{callback:v=>'S/'+(v/1000)+'k'},grace:'10%'}}}});
  const de = document.getElementById('dropDist');
  const drawMulti = () => {
    const bs = filtraMeses('dist', bloquesAnio);
    const distNombres = [...new Set(bs.flatMap(b=>b.distritos.filter(d=>distOK(d.d)).map(d=>d.d)))];
    const palette2 = ['#D81F26','#1B1B1F','#8E939B','#B5151B','#4A4F5A','#E6A817','#7A8290'];
    mkChart('chDistMulti',{type:'line',data:{labels:bs.map(b=>MESN[b.m].slice(0,3).toUpperCase()),datasets:
      distNombres.map((nombre,i)=>({label:nombre,data:bs.map(b=>{const d=(b.distritos||[]).find(x=>x.d===nombre);return d?d.act:0;}),borderColor:palette2[i%palette2.length],backgroundColor:palette2[i%palette2.length],tension:.3,pointRadius:3,fill:false}))
    },options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>'S/'+(v/1000)+'k'}}}}});
  };
  if(de) de.innerHTML = dropMeses('dist', bloquesAnio.map(b=>b.m), drawMulti);
  drawMulti();
}
function detalleUsuarios(ym){
  const det = DATA.detalle||{};
  if(!det.usuarios || !det.usuarios.length || det.mes_detalle!==ym) return '';
  const rows = det.usuarios.map((u,i)=>`<tr><td>${i+1}. ${u.u}</td><td>${u.c}</td><td>${u.d}</td><td class="num">${fN(u.n)}</td><td class="num">${fN(u.act)}</td><td class="num">${fS(u.sig)}</td></tr>`).join('');

  <div class="twrap"><table><thead><tr><th>Vendedor</th><th>Canal</th><th>Distrito</th><th>Transacciones</th><th>Activación</th><th>Sin IGV</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ================= CANALES (mensual, con proyección por día de avance) ================= */
function canalMensualDe(ym){ const [y,m]=ym.split('-').map(Number); return (DATA.canalesMensual||[]).find(c=>c.y===y&&c.m===m)||null; }
function rCanales(ym){
  const [y,m] = ym.split('-').map(Number);
  const el = document.getElementById('tab-canales');
  const cm = canalMensualDe(ym);
  if(!cm){ el.innerHTML = `<h2>Canales — ${MESN[m]} ${y}</h2><div class="card">Aún no hay datos de canales para este mes. Se alimenta mensual desde el driver (VOLUMEN).</div>`; return; }
  const cmPrev = canalMensualDe(ymPrev(ym));
  const diaAv = cm.diaAvance || cm.diasMes;
  const mk = (key,label,color,chip) => {
    const tot = cm[key]||0;
    const pd = diaAv ? tot/diaAv : 0;
    const prevTot = cmPrev ? (cmPrev[key]||0) : null;
    return {key, label, color, chip, tot, pd, proy: pd*cm.diasMes, prevTot};
  };
  const cs = [mk('ffvv','FFVV','#1B1B1F','ch-negro'), mk('cp','CELL POWER','#D81F26','ch-rojo'), mk('zil','ZILICOM','#8E939B','ch-gris')];
  const enCurso = diaAv < cm.diasMes;
  const serie = (DATA.canalesMensual||[]).filter(c=>c.y===y).sort((a,b)=>a.m-b.m);
  el.innerHTML = `
  <h2>Canales — ${MESN[m]} ${y} <span class="tag">mayoristas y fuerza de venta · alimentado mensual desde el driver</span></h2>
  <div class="grid kpis">${cs.map(c=>`
    <div class="card kpi"><div class="chip ${c.chip}">${ICO.dinero}</div><div>
      <div class="lbl">${c.label}</div><div class="val num">${fS(c.tot)}</div>
      <div class="lbl" style="font-weight:500;text-transform:none;letter-spacing:0;margin-top:4px">Pro. diario ${fS(c.pd)} · Proyección <b>${fS(c.proy)}</b></div>
      ${vsChip(c.tot, c.prevTot, v=>fS(v))}
    </div></div>`).join('')}
  </div>
  ${enCurso?`<p class="note">Mes en curso: día de avance ${diaAv} de ${cm.diasMes} — el promedio diario y la proyección se recalculan según lo alimentado hasta hoy.</p>`:''}
  <div class="chartbox"><div class="ch"><canvas id="chCanales"></canvas></div></div>
  <div class="grid two">
    <div class="chartbox" style="margin:0"><h2 style="margin-top:0">Participación del mes</h2><div class="ch" style="height:260px"><canvas id="chPie"></canvas></div></div>
    <div class="chartbox" style="margin:0"><h2 style="margin-top:0">% avance del mes (día ${diaAv}/${cm.diasMes})</h2><div class="ch" style="height:260px"><canvas id="chAvanceMes"></canvas></div></div>
  </div>`;
  mkChart('chCanales',{type:'bar',data:{labels:serie.map(c=>MESN[c.m].slice(0,3).toUpperCase()),datasets:[
    {label:'FFVV',data:serie.map(c=>c.ffvv),backgroundColor:'#1B1B1F',stack:'s'},
    {label:'CELL POWER',data:serie.map(c=>c.cp),backgroundColor:'#D81F26',stack:'s'},
    {label:'ZILICOM',data:serie.map(c=>c.zil),backgroundColor:'#8E939B',stack:'s'}
  ]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>'S/'+(v/1000)+'k'}}}}});
  mkChart('chPie',{type:'doughnut',data:{labels:cs.map(c=>c.label),datasets:[{data:cs.map(c=>c.tot),backgroundColor:cs.map(c=>c.color),borderWidth:2,borderColor:'#fff'}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'right'}}}});
  mkChart('chAvanceMes',{type:'bar',data:{labels:cs.map(c=>c.label),datasets:[{label:'% del día de avance',data:cs.map(c=>diaAv?100*c.pd*diaAv/(c.proy||1):0),backgroundColor:cs.map(c=>c.color),borderRadius:6}]},options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v+'%'},max:110}}}});
}

    ]},options:{maintainAspectRatio:false,animation:false,layout:{padding:{top:18}},plugins:{legend:{position:'bottom'},barLabels:{on:true,fmt:'k'}},scales:{y:{ticks:{callback:v=>'S/'+(v/1000)+'k'},grace:'8%'},y2:{position:'right',grid:{display:false},ticks:{callback:v=>v+'%'}}}}});
    const hayParcial = vals.some(x=>x.parcial);

/* ================= MULTIMARCA ================= */
function rMultimarca(){
  const el = document.getElementById('tab-multimarca');
  const mm = DATA.multimarca;
  if(!mm || (!mm.indicadores.length && !mm.distritos.length)){
    el.innerHTML = `<h2>Multimarca</h2><div class="card">No se encontró la hoja MULTIMARCA en el archivo cargado. Agrégala al Excel y vuelve a actualizar.</div>`;
    return;
  }
  const tit = mm.titulo || 'Canal Multimarca';
  // OJO: en la hoja, la columna ACTIVACION del bloque resumen viene igual a la CUOTA (es la meta);
  // el avance REAL son las columnas AVA por distrito (que se llenan a mano). Sumamos esas para el avance.
  const sumaAva = {
    'Activacion Prepago': mm.distritos.reduce((s,d)=>s+(d.ava_pre||0),0),
    'Capilaridad Prepago': mm.distritos.reduce((s,d)=>s+(d.ava_cap_pre||0),0),
    'Activacion Postpago': mm.distritos.reduce((s,d)=>s+(d.ava_chip_post||0),0),
    'Capilaridad Postpago': mm.distritos.reduce((s,d)=>s+(d.ava_cap_post||0),0)
  };
  const avanceDe = nombre => {
    // empareja "Activacion Prepago" / "Capilaridad Postpago" etc.
    const k = Object.keys(sumaAva).find(x=>x.toUpperCase()===nombre.toUpperCase());
    return k ? sumaAva[k] : 0;
  };
  const hayAvance = mm.distritos.some(d=>d.ava_pre!=null||d.ava_cap_pre!=null||d.ava_chip_post!=null||d.ava_cap_post!=null);
  // KPIs de indicadores: cuota (meta) vs avance real (AVA)
  const chips = ['ch-rojo','ch-negro','ch-rojo','ch-negro'];
  const kpis = mm.indicadores.map((x,i)=>{
    const meta = x.cuota;
    const av = avanceDe(x.n);
    const p = meta ? av/meta : null;
    return `<div class="card kpi"><div class="chip ${chips[i%4]}">${ICO.rayo}</div><div>
      <div class="lbl">${x.n}</div>
      <div class="val num">${fN(av)} <small>/ ${fN(meta)}</small></div>
      <div class="vs ${p==null?'eq':p>=1?'up':'dn'}" style="${p==null?'':p>=1?'background:var(--verde-bg);color:var(--verde)':'background:var(--rojo-bg);color:var(--rojo)'}">${p==null?'—':fP(p)} de la meta</div>
    </div></div>`;
  }).join('');
  // Tabla por distrito: prepago y postpago (chips + capilaridad), con avance si existe
  const filaDist = d => {
    const cell = (cuota,ava) => {
      if(ava!=null && cuota){ const p=ava/cuota; return `<td class="num">${fN(ava)} <span style="color:var(--ink2);font-size:11px">/ ${fN(cuota)}</span> <span class="pill ${semClass(p)}" style="margin-left:4px">${fP(p)}</span></td>`; }
      return `<td class="num">${fN(cuota)}${ava!=null?' / '+fN(ava):' <span style="color:var(--ink2);font-size:10px">meta</span>'}</td>`;
    };
    return `<tr><td>${d.d}</td><td>${d.zona||''}</td><td>${d.resp||''}</td>
      ${cell(d.chips_pre,d.ava_pre)}${cell(d.cap_pre,d.ava_cap_pre)}
      ${cell(d.chips_post,d.ava_chip_post)}${cell(d.cap_post,d.ava_cap_post)}</tr>`;
  };
  const t = mm.total;
  const totFila = t ? `<tr class="tot"><td>TOTAL</td><td></td><td></td>
    <td class="num">${fN(t.chips_pre)}${t.ava_pre!=null?' / '+fN(t.ava_pre):''}</td>
    <td class="num">${fN(t.cap_pre)}${t.ava_cap_pre!=null?' / '+fN(t.ava_cap_pre):''}</td>
    <td class="num">${fN(t.chips_post)}${t.ava_chip_post!=null?' / '+fN(t.ava_chip_post):''}</td>
    <td class="num">${fN(t.cap_post)}${t.ava_cap_post!=null?' / '+fN(t.ava_cap_post):''}</td></tr>` : '';
  el.innerHTML = `
  <h2>${tit} <span class="tag">meta vs avance del canal multimarca</span></h2>
  ${!hayAvance?'<div class="card" style="border-left:4px solid var(--ambar);margin-bottom:14px"><b>Avance aún en 0.</b> Las columnas AVA (avance) de la hoja MULTIMARCA están vacías. Llénalas conforme avancen las activaciones y el % se calculará solo. Por ahora las cifras grandes son la <b>meta</b>.</div>':''}
  <div class="grid kpis">${kpis}</div>
  <div class="chartbox"><div class="ch"><canvas id="chMM"></canvas></div></div>
  <h2 style="margin-top:22px">Por distrito <span class="tag">chips y capilaridad · prepago y postpago</span></h2>
  <div class="twrap"><table>
    <thead><tr><th>Distrito</th><th>Zona</th><th>Responsable</th><th>Chips prepago</th><th>Capilaridad pre</th><th>Chips postpago</th><th>Capilaridad post</th></tr></thead>
    <tbody>${mm.distritos.map(filaDist).join('')}${totFila}</tbody>
  </table></div>
  <p class="note">${hayAvance?'Cada celda muestra avance / meta y su %.':'Las columnas muestran la <b>meta</b>. Cuando llenes las columnas AVA (avance) en la hoja MULTIMARCA, aparecerá el avance y el % automáticamente.'}</p>`;
  // gráfico: meta (gris) vs avance real (rojo) de los 4 indicadores
  mkChart('chMM',{type:'bar',data:{labels:mm.indicadores.map(x=>x.n),datasets:[
    {label:'Meta',data:mm.indicadores.map(x=>x.cuota),backgroundColor:'#D9DCE1',borderRadius:5,labelColor:'#6B7077'},
    {label:'Avance',data:mm.indicadores.map(x=>avanceDe(x.n)),backgroundColor:'#D81F26',borderRadius:5,labelColor:'#1B1B1F'}
  ]},options:{maintainAspectRatio:false,animation:false,layout:{padding:{top:18}},
    plugins:{legend:{position:'bottom'},barLabels:{on:true,fmt:'n'}},scales:{y:{grace:'10%'}}}});
}

  <div class="chartbox"><h2 style="margin-top:0">Top 10 asesores — ${mesActivo[0]+mesActivo.slice(1).toLowerCase()}</h2><div class="ch" style="height:${Math.max(280, top10.length*38)}px"><canvas id="chAsesTop"></canvas></div></div>

  drawMulti();
  ['mselAses','mselAsesMulti','mselAsesTabla'].forEach(id=>{
    const contV = document.getElementById(id);
    if(!contV) return;

      asesVendSel = new Set([...contV.querySelectorAll('input:checked')].map(c=>c.dataset.v));

    contV.querySelector('.selNada').onclick = ()=>{ asesVendSel = new Set(); rAsesores(ym); };
  });
}

      <div class="card"><div class="kpi"><div class="chip ch-negro">${_ICDEB}</div><div><div class="lbl">Meta</div><div class="val num">≤ 10<small>%</small></div></div></div></div>
      <div class="card"><div class="kpi"><div class="chip ch-rojo">${_ICDEB}</div><div><div class="lbl">En desabasto</div><div class="val num">${t.deb.toLocaleString()}</div><div class="vs eq"><span class="txt">saldo &lt; S/7</span></div></div></div></div>

    let rd=distF.map(d=>{const p=d.cli?100*d.deb/d.cli:0;return `<tr><td>${d.d}</td><td class="num">${d.cli}</td><td class="num">${d.deb}</td><td>${_pill(p,false)}</td></tr>`}).join('');
    h+=`<h2>Por distrito</h2><div class="twrap"><table><thead><tr><th>Distrito</th><th>Clientes</th><th>Desabasto</th><th>%</th></tr></thead><tbody>${rd}<tr class="tot"><td>Total</td><td class="num">${t.cli.toLocaleString()}</td><td class="num">${t.deb.toLocaleString()}</td><td>${_pill(pct,false)}</td></tr></tbody></table></div>`;
    h+=`<p class="note">Nota: el reporte de saldo cargado trae ${t.cli.toLocaleString()} clientes. Cuando subas el reporte completo (debe cubrir todos los operativos), el denominador se actualiza solo.</p>`;

  } else if(dm){
    const pct = dm.pctGeneral*100;
    const bien = pct<=10;
    const col = bien?'#13A05F':'#D81F26';

    document.getElementById('tab-desabasto').innerHTML=h;

  if(histo.length){
    const elEv = document.createElement('div');

    document.getElementById('tab-desabasto').appendChild(elEv);
    mkChart('chDebEvo',{type:'line',data:{labels:histo.map(x=>MESN[x.m].slice(0,3).toUpperCase()),datasets:[
      {label:'% General',data:histo.map(x=>x.pctGeneral*100),borderColor:'#D81F26',tension:.3,pointRadius:3}
    ]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'%'}}}}});
  }
}


/* ========== Barra de filtro AÑO / MES / DISTRITO (estilo masivo) ========== */
let anioGlob=null, mesesGlob=null, distsGlob=null;
const normD = s => (s||'').toString().trim().toUpperCase().replace(/\s+/g,' ');
function _distritosLista(){
  const map=new Map();
  const add=name=>{ const k=normD(name); if(k && !map.has(k)) map.set(k,name); };
  EMB_MEDIDAS.ope.dist.forEach(d=>add(d.d));
  EMB_MEDIDAS.deb.dist.forEach(d=>add(d.d));
  (DATA.bloques||[]).forEach(b=>(b.distritos||[]).forEach(d=>add(d.d)));
  return [...map.entries()].map(([key,name])=>({key,name})).sort((a,b)=>a.name.localeCompare(b.name));
}
function distOK(d){ if(distsGlob==null) return true; return distsGlob.has(normD(d)); }
/* ===== Cuota oficial por distrito (del correo, vía Sheet) ===== */
function cuotaPdvTotal(){
  if(!CUOTAS_LIVE || !CUOTAS_LIVE.dist) return null;
  return CUOTAS_LIVE.dist.filter(x=>distOK(x.d)).reduce((s,x)=>s+(x.pdv||0),0);
}
function cuotaVolTotal(){
  if(!CUOTAS_LIVE || !CUOTAS_LIVE.dist) return null;
  return CUOTAS_LIVE.dist.filter(x=>distOK(x.d)).reduce((s,x)=>s+(x.vol||0),0);
}

const API_REC='https://script.google.com/macros/s/AKfycbxcS96sW_FVH--mrsbbMdJk4TFuQFu8WLkBsCoPSNStbyfEdHJh-6DgvUFF2J-FLdWB2g/exec';
let USUARIO_REC=null;
async function cargarVivo(){
  try{

    if(j && j.ok && j.operativos && j.operativos.tot && j.operativos.tot.cli>0){
      EMB_MEDIDAS={ ope:j.operativos, deb:(j.desabasto && j.desabasto.tot)?j.desabasto:EMB_MEDIDAS.deb };

      try{ toast('Datos de recarga actualizados en vivo'); }catch(e){}

}

function curMonth(){
  const ms=mesesDisponibles();
  if(mesesGlob && mesesGlob.size){
    const eleg=ms.filter(m=>mesesGlob.has(m));
    if(eleg.length) return eleg[eleg.length-1];
  }
  if(anioGlob){ const a=ms.filter(m=>+m.split('-')[0]===anioGlob); if(a.length) return a[a.length-1]; }
  return ms[ms.length-1];
}
function renderFbar(){
  const fb=document.getElementById('fbar'); if(!fb) return;
  const ms=mesesDisponibles();
  const anios=[...new Set(ms.map(m=>+m.split('-')[0]))].sort();
  if(!anioGlob || !anios.includes(anioGlob)) anioGlob=anios[anios.length-1];
  const msAnio=ms.filter(m=>+m.split('-')[0]===anioGlob);
  if(mesesGlob){ mesesGlob=new Set([...mesesGlob].filter(m=>msAnio.includes(m))); }
  const dists=_distritosLista();
  const mesChk = m => mesesGlob ? mesesGlob.has(m) : true;
  const distChk = k => distsGlob ? distsGlob.has(k) : true;
  const mesLabel = () => !mesesGlob ? 'Todos' : (mesesGlob.size===0 ? 'Ninguno' : (mesesGlob.size===msAnio.length ? 'Todos' : mesesGlob.size+' meses'));
  const distLabel = () => !distsGlob ? 'Todos' : (distsGlob.size===0 ? 'Ninguno' : (distsGlob.size===dists.length ? 'Todos' : distsGlob.size+' distritos'));
  fb.innerHTML = `
    <div class="fg"><span class="fl">Año</span>
      <select class="dk" id="fbAnio">${anios.map(a=>`<option ${a===anioGlob?'selected':''}>${a}</option>`).join('')}</select></div>
    <div class="fg"><span class="fl">Mes</span>
      <div class="msel dk" id="fbMes"><div class="btn"><span class="lbl">${mesLabel()}</span> <span class="arr">▼</span></div>
        <div class="panel"><div class="top"><span class="selTodos">Todos</span><span class="selNada">Ninguno</span></div>
        ${msAnio.map(m=>{const mm=+m.split('-')[1];return `<label><input type="checkbox" data-m="${m}" ${mesChk(m)?'checked':''}> ${MESN[mm]}</label>`}).join('')}</div></div></div>
    <div class="fg"><span class="fl">Distrito</span>
      <div class="msel dk" id="fbDist"><div class="btn"><span class="lbl">${distLabel()}</span> <span class="arr">▼</span></div>
        <div class="panel"><div class="top"><span class="selTodos">Todos</span><span class="selNada">Ninguno</span></div>
        ${dists.map(x=>`<label><input type="checkbox" data-d="${x.key}" ${distChk(x.key)?'checked':''}> ${x.name}</label>`).join('')}</div></div></div>`;
  document.getElementById('fbAnio').onchange=e=>{ anioGlob=+e.target.value; mesesGlob=null; renderFbar(); renderAll(); };
  function wireMsel(id, attr, total, assign, labelFn){
    const cont=document.getElementById(id);
    const lbl=cont.querySelector('.lbl');
    cont.querySelector('.panel').addEventListener('click', e=>e.stopPropagation());
    cont.querySelector('.btn').onclick=e=>{ e.stopPropagation(); document.querySelectorAll('.msel.open').forEach(x=>{if(x!==cont)x.classList.remove('open')}); cont.classList.toggle('open'); };
    function commit(){
      const set=new Set([...cont.querySelectorAll('input:checked')].map(c=>c.dataset[attr]));
      assign(set.size===total ? null : set);
      lbl.textContent=labelFn();
      renderAll();
    }
    cont.querySelectorAll('input[type=checkbox]').forEach(chk=>chk.onchange=commit);
    cont.querySelector('.selTodos').onclick=e=>{ e.stopPropagation(); cont.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=true); commit(); };
    cont.querySelector('.selNada').onclick=e=>{ e.stopPropagation(); cont.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false); commit(); };
  }
  wireMsel('fbMes','m', msAnio.length, set=>{ mesesGlob=set; }, mesLabel);
  wireMsel('fbDist','d', dists.length, set=>{ distsGlob=set; }, distLabel);
}

  pintar('');
}

/* ================= drag & drop / parser SheetJS ================= */
const MESES_MAP = {'ENERO':1,'FEBRERO':2,'MARZO':3,'ABRIL':4,'MAYO':5,'JUNIO':6,'JULIO':7,'AGOSTO':8,'SETIEMBRE':9,'SEPTIEMBRE':9,'OCTUBRE':10,'NOVIEMBRE':11,'DICIEMBRE':12};
function toDateStr(v){
  if(v instanceof Date && !isNaN(v)) { const z=new Date(v.getTime()-v.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); }
  if(typeof v==='number'){ const d=XLSX.SSF.parse_date_code(v); if(d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; }
  return null;
}
const nz = v => typeof v==='number' && isFinite(v) ? Math.round(v*100)/100 : null;

function parseWB(wb){
  const out = {daily:[],cuotas:[],bloques:[],detalle:{mes_detalle:null,usuarios:[]}};
  const av = wb.Sheets['ACTI - VENTA'];
  if(!av) throw 'No encuentro la hoja "ACTI - VENTA"';
  XLSX.utils.sheet_to_json(av,{header:1,raw:true,defval:null}).forEach(r=>{
    const f = toDateStr(r[1]); if(!f) return;
    out.daily.push({f,act:nz(r[2])||0,rec:nz(r[4])||0,sig:nz(r[5])||0,dif:nz(r[6]),zil:nz(r[7]),cp:nz(r[8]),ffvv:nz(r[9])});
  });
  const cq = wb.Sheets['CUOTAS'];
  if(cq) XLSX.utils.sheet_to_json(cq,{header:1,raw:true,defval:null}).forEach(r=>{
    if(typeof r[0]!=='string') return;
    const m = MESES_MAP[r[0].trim().toUpperCase()]; const y = +r[1];
    if(!m || !y) return;
    out.cuotas.push({y,m,cuota:nz(r[2]),cierre:nz(r[3]),alcance:nz(r[4]),bono:nz(r[6]),dif:nz(r[8]),dias:nz(r[11]),actdia:nz(r[12])});
  });
  const ps = wb.Sheets['PROYECCION'];
  if(ps){
    const rows = XLSX.utils.sheet_to_json(ps,{header:1,raw:true,defval:null});
    const pat = /^(ENERO|FEBRERO|MARZO|ABRIL|MAYO|JUNIO|JULIO|AGOSTO|SETIEMBRE|SEPTIEMBRE|OCTUBRE|NOVIEMBRE|DICIEMBRE)\s*-\s*(\d{4})$/;
    const hdrs = [];
    rows.forEach((r,i)=>{ if(typeof r[2]==='string'){const mm=r[2].trim().toUpperCase().match(pat); if(mm) hdrs.push([i,MESES_MAP[mm[1]],+mm[2]]);}});
    hdrs.forEach(([i,m,y],n)=>{
      const end = n+1<hdrs.length ? hdrs[n+1][0] : Math.min(i+35, rows.length);
      const b = {y,m,distritos:[]}; let inDist=false;
      rows.slice(i,end).forEach(r=>{
        const a = (typeof r[0]==='string'?r[0].trim().toUpperCase():'');
        const bb = (typeof r[1]==='string'?r[1].trim().toUpperCase():'');
        if(bb.startsWith('D. UTILES')){b.du_venta=nz(r[2]);b.du_act=nz(r[3]);}
        else if(bb.startsWith('D. TRANSCURRID')){b.dt_venta=nz(r[2]);b.dt_act=nz(r[3]);}
        else if(bb.includes('PDV')){b.pdv_ope=nz(r[2]);}
        else if(bb==='AVANCE'){b.pdv_avance=nz(r[2]);}
        else if(bb==='FALTA'){b.pdv_falta=nz(r[2]);}
        if(a==='BLAZEL SIN IGV'){b.cuota=nz(r[2]);b.act=nz(r[3]);b.proy=nz(r[4]);}
        if(a==='DISTRITO' && !r[1]){inDist=true;return;}
        if(inDist){
          if(!a||a==='CUOTA') return;
          if(a==='TOTAL'){b.dist_total={cuota:nz(r[2]),act:nz(r[3]),proy:nz(r[4])};inDist=false;return;}
          if(r[2]!=null||r[3]!=null) b.distritos.push({d:String(r[0]).trim(),cuota:nz(r[2]),act:nz(r[3]),proy:nz(r[4])});
        }
      });
      if(b.cuota!=null || b.pdv_ope!=null) out.bloques.push(b);
    });
  }
  const users={};
  ['ZILICOM','CELL POWER','CASHNET'].forEach(n=>{
    const s = wb.Sheets[n]; if(!s) return;
    XLSX.utils.sheet_to_json(s,{header:1,raw:true,defval:null}).slice(1).forEach(r=>{
      const f = toDateStr(r[2]); if(!f) return;
      if(!out.detalle.mes_detalle) out.detalle.mes_detalle = f.slice(0,7);
      const u = String(r[3]||'SIN NOMBRE').trim();
      const o = users[u] = users[u]||{act:0,sig:0,canal:String(r[5]||n).trim(),d:String(r[7]||'').trim(),n:0};
      o.act+=nz(r[10])||0; o.sig+=nz(r[11])||0; o.n++;
    });
  });
  out.detalle.usuarios = Object.entries(users).map(([u,v])=>({u,act:Math.round(v.act),sig:Math.round(v.sig*100)/100,c:v.canal,d:v.d,n:v.n})).sort((a,b)=>b.sig-a.sig).slice(0,60);
  // MULTIMARCA
  const sm = wb.Sheets['MULTIMARCA'];
  if(sm){
    const mr = XLSX.utils.sheet_to_json(sm,{header:1,raw:true,defval:null});
    const mm = {titulo:null,indicadores:[],distritos:[],total:null};
    let inInd=false, inDist=false;
    mr.forEach(r=>{
      const a = (typeof r[0]==='string'?r[0].trim():'');
      const au = a.toUpperCase();
      if(au.includes('MULTIMARCA') && (au.includes('CANAL')||au.includes('BLAZEL'))){ mm.titulo=a; inInd=true; return; }
      if(au==='DISTRITOS'){ inInd=false; inDist=true; return; }
      if(inInd){
        if(!a){ if(mm.indicadores.length) inInd=false; return; }
        mm.indicadores.push({n:a,cuota:nz(r[1]),act:nz(r[2]),proy:nz(r[3])});
      } else if(inDist){
        if(!a) return;
        if(au==='TOTAL'){ mm.total={chips_pre:nz(r[3]),ava_pre:nz(r[4]),cap_pre:nz(r[5]),ava_cap_pre:nz(r[6]),chips_post:nz(r[7]),ava_chip_post:nz(r[8]),cap_post:nz(r[9]),ava_cap_post:nz(r[10])}; inDist=false; return; }
        mm.distritos.push({d:a,zona:typeof r[1]==='string'?r[1].trim():'',resp:typeof r[2]==='string'?r[2].trim():'',
          chips_pre:nz(r[3]),ava_pre:nz(r[4]),cap_pre:nz(r[5]),ava_cap_pre:nz(r[6]),chips_post:nz(r[7]),ava_chip_post:nz(r[8]),cap_post:nz(r[9]),ava_cap_post:nz(r[10])});
      }
    });
    out.multimarca = mm;
  }
  // COMPARATIVO MULTIMARCA (por cliente: cierre junio vs avance julio)
  const sc = wb.Sheets['COMPARATIVO MULTIMARCA'];
  if(sc){
    const cr = XLSX.utils.sheet_to_json(sc,{header:1,raw:true,defval:null});
    const filas=[]; let started=false;
    cr.forEach(r=>{
      const a=r[0];
      const au=(typeof a==='string'?a.trim().toUpperCase():'');
      if(!started){ if(au==='DNI') started=true; return; }
      if(au==='DNI') return;
      if(a==null || a==='') return;
      const dni=String(a).trim();
      const nombre=(typeof r[1]==='string'?r[1]:String(r[1]||'')).trim();
      if(!dni && !nombre) return;
      filas.push({dni, nombre,
        distrito:(typeof r[2]==='string'?r[2].trim():''),
        vendedor:(typeof r[3]==='string'?r[3].trim():''),
        jun_pre:nz(r[4])||0, jun_post:nz(r[5])||0,
        jul_pre:nz(r[6])||0, jul_post:nz(r[7])||0});
    });
    out.comparativo = filas;
  }
  if(!out.daily.length) throw 'No se encontraron fechas válidas en ACTI - VENTA';
  out.daily.sort((a,b)=>a.f<b.f?-1:1);
  return out;
}

function toast(msg, ok=true){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = ok?'#13A05F':'#D81F26'; t.style.display='block';
  setTimeout(()=>t.style.display='none', 3500);
}
function handleFile(file){
  const rd = new FileReader();
  rd.onload = e => {
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      DATA = parseWB(wb);
      document.getElementById('selMes').value = '';
      anioCuotaSel = null; anioPdvSel = null;
      anioGlob = null; mesesGlob = null;
      renderFbar(); renderAll();
      if(USUARIO_REC && USUARIOS_REC[USUARIO_REC] && USUARIOS_REC[USUARIO_REC].masivo) subirVolumen();
      // Persistir para que se conserve al cerrar y reabrir
      let guardado = false;
      try{
        localStorage.setItem(LS_KEY, JSON.stringify(DATA));
        localStorage.setItem(LS_META, JSON.stringify({archivo:file.name, fecha:new Date().toISOString()}));
        usandoGuardado = true; guardado = true;
      }catch(err){ /* sin espacio o sin permiso */ }
      actualizarIndicador();
      toast(guardado ? '✓ Guardado: ' + file.name + ' (se conservará al reabrir)' : '✓ Cargado: ' + file.name + ' (no se pudo guardar en este navegador)');
    }catch(err){ toast('Error: '+err, false); }
  };
  rd.readAsArrayBuffer(file);
}
function actualizarIndicador(){
  const el = document.getElementById('fechaData');
  let meta = null;
  try{ meta = JSON.parse(localStorage.getItem(LS_META)||'null'); }catch(e){}
  const ult = DATA.daily.length ? DATA.daily[DATA.daily.length-1].f.split('-').reverse().join('/') : '—';
  if(usandoGuardado && meta){
    const f = new Date(meta.fecha);
    el.innerHTML = `Datos al ${ult} · <span style="color:#13A05F">guardado</span> <button id="btnReset" title="Volver a los datos de ejemplo" style="background:none;border:1px solid #3A3A42;color:#9AA3B0;border-radius:6px;padding:2px 7px;font-size:10px;cursor:pointer;margin-left:4px">↺ Reiniciar</button>`;
    const br = document.getElementById('btnReset');
    if(br) br.onclick = resetData;
  } else {
    el.innerHTML = `Datos al ${ult} <span style="color:#6B7077">· ejemplo</span>`;
  }
}
function resetData(){
  try{ localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_META); }catch(e){}
  DATA = RAW; usandoGuardado = false;
  document.getElementById('selMes').value = '';
  anioCuotaSel = null; anioPdvSel = null;
  anioGlob = null; mesesGlob = null; distsGlob = null;
  renderFbar(); renderAll(); actualizarIndicador();
  toast('Tablero reiniciado a los datos de ejemplo');
}
document.getElementById('btnDrop').onclick = ()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };
let dragN = 0;
window.addEventListener('dragenter', e=>{e.preventDefault(); dragN++; document.getElementById('dropZone').classList.add('on');});
window.addEventListener('dragleave', e=>{e.preventDefault(); if(--dragN<=0){dragN=0;document.getElementById('dropZone').classList.remove('on');}});
window.addEventListener('dragover', e=>e.preventDefault());
window.addEventListener('drop', e=>{
  e.preventDefault(); dragN=0; document.getElementById('dropZone').classList.remove('on');
  if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

const API_URL_V2 = 'https://script.google.com/macros/s/AKfycbzXE6fw7sz0alHy6--UYYx7_EfYGOF7VcKQNl3MPT4BtDN95znswMGuo7Qid30QFsLzrw/exec';

/* ===== Carga en vivo (driver) para Operativos/Desabasto/Canales/Cuotas/Asesores/Multimarca 2026+ ===== */
async function cargarLiveV2(){
  if(!API_URL_V2 || API_URL_V2.indexOf('PEGAR_AQUI')===0) return;
  try{
    const res = await fetch(API_URL_V2);
    const live = await res.json();
    DATA.cuotas = DATA.cuotas.filter(c=>c.y<2026).concat(live.cuotas2026||[]);
    DATA.bloques = DATA.bloques.filter(b=>b.y<2026).concat(live.bloques2026||[]);
    if(live.canalesMensual) DATA.canalesMensual = live.canalesMensual;
    if(live.asesoresMensual) DATA.asesoresMensual = live.asesoresMensual;
    if(live.desabastoMensual) DATA.desabastoMensual = live.desabastoMensual;
    if(live.multimarca) DATA.multimarca = live.multimarca;
    if(live.comparativo) DATA.comparativo = live.comparativo;
    if(live.deb) EMB_MEDIDAS.deb = live.deb;
    if(live.ope) EMB_MEDIDAS.ope = { tot: live.ope.tot, dist: live.ope.dist, vend: EMB_MEDIDAS.ope.vend };
    try{ toast('Datos de recarga (driver) actualizados en vivo'); }catch(e){}
    try{ renderFbar(); renderAll(); }catch(e2){ console.error('renderAll tras cargarLiveV2', e2); }
    const fd = document.getElementById('fechaData');
    if(fd) fd.innerHTML = `Recarga actualizada: ${new Date().toLocaleString('es-PE')} <span style="color:#13A05F;font-weight:700">● en vivo</span>`;
  }catch(e){
    console.error('cargarLiveV2', e);
    const fd = document.getElementById('fechaData');
    if(fd) fd.innerHTML = `<span style="color:#E1251B">⚠ No se pudo cargar en vivo (revisa la URL o permisos del Web App)</span>`;
  }
}

/* ===== Login recarga + botón MASIVO ===== */
const USUARIOS_REC = {
  jmaza:  { clave:'jmaza',  masivo:true  },
  amparo: { clave:'amparo', masivo:false },
  gracie: { clave:'gracie', masivo:false, soloMM:true }
};
const URL_MASIVO = 'https://juliomazad.github.io/avance-pdv-blazel/DASHBOARD_BLAZEL_LIVE.html';
(function(){
  const ov=document.getElementById('loginOverlay'); if(!ov) return;
  const err=document.getElementById('lerr');
  function aplicar(u){
    USUARIO_REC=u;
    ov.style.display='none';
    const bm=document.getElementById('btnMasivo');
    if(USUARIOS_REC[u].masivo){ bm.style.display=''; bm.href=URL_MASIVO; } else { bm.style.display='none'; }
    if(USUARIOS_REC[u].soloMM){
      document.querySelectorAll('nav button').forEach(bt=>{
        if(bt.dataset.t!=='multimarca' && bt.dataset.t!=='comparativo') bt.style.display='none';
      });
      const sel=document.getElementById('selMes'); if(sel) sel.style.display='none';
      const fb=document.getElementById('fbar'); if(fb) fb.style.display='none';
      document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      const btMM=document.querySelector('nav button[data-t="multimarca"]');
      if(btMM) btMM.classList.add('on');
      const tabMM=document.getElementById('tab-multimarca');
      if(tabMM) tabMM.classList.add('on');
    }
  }
  function entrar(){
    const u=document.getElementById('luser').value.trim().toLowerCase();
    const k=document.getElementById('lpass').value;
    const c=USUARIOS_REC[u];
    if(!c || c.clave!==k){ err.textContent='Usuario o clave incorrectos.'; document.getElementById('lpass').value=''; return; }
    try{ sessionStorage.setItem('rec_user',u); }catch(e){}
    aplicar(u);
  }
  document.getElementById('lbtn').onclick=entrar;
  document.getElementById('lpass').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
  document.getElementById('luser').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('lpass').focus(); });
  // Embebido dentro del masivo: ?embed=1&u=xxx -> entra directo, sin pedir login ni botón MASIVO
  try{
    const qs=new URLSearchParams(location.search);
    if(qs.get('embed')==='1'){
      const uu=(qs.get('u')||'').toLowerCase();
      if(USUARIOS_REC[uu]){ aplicar(uu); const bm=document.getElementById('btnMasivo'); if(bm) bm.style.display='none'; return; }
    }
  }catch(e){}
  try{ const su=sessionStorage.getItem('rec_user'); if(su && USUARIOS_REC[su]){ aplicar(su); return; } }catch(e){}
  document.getElementById('luser').focus();
})();
</script>
